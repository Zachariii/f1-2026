<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🏎️ F1 2026 实时积分</title>
<style>
  :root {
    --f1-red: #E10600;
    --f1-dark: #15151E;
    --f1-card: #1A1A26;
    --f1-card2: #1F1F2E;
    --f1-border: #2A2A3E;
    --f1-text: #E0E0E0;
    --f1-muted: #8888A0;
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0B0B14;
    color: var(--f1-text);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #0D0D1A 0%, #1A0A0E 40%, var(--f1-red) 100%);
    padding: clamp(28px, 5vw, 50px) 16px clamp(20px, 4vw, 36px);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 20%, rgba(225,6,0,0.15) 0%, transparent 60%);
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--f1-red) 0px, var(--f1-red) 36px, #fff 36px, #fff 72px);
  }
  .hero h1 {
    font-size: clamp(1.6rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.5px;
    position: relative;
    text-shadow: 0 2px 12px rgba(225,6,0,0.3);
  }
  .hero .sub {
    margin-top: 6px;
    font-size: clamp(0.8rem, 2vw, 1rem);
    opacity: 0.85;
    position: relative;
  }
  .hero .refresh-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 4px 14px;
    background: rgba(0,0,0,0.35);
    border-radius: 20px;
    font-size: 0.72rem;
    opacity: 0.8;
    position: relative;
  }
  .refresh-badge .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4CAF50;
  }
  .refresh-badge .dot.stale { background: #FF9800; }
  .refresh-badge .dot.loading { background: #FFC107; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Nav tabs */
  nav {
    background: var(--f1-dark);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(225,6,0,0.3);
    backdrop-filter: blur(8px);
  }
  nav .tabs {
    display: flex;
    max-width: 900px;
    margin: 0 auto;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  nav .tabs::-webkit-scrollbar { display: none; }
  nav button {
    flex: 1;
    min-width: fit-content;
    padding: 13px 16px;
    background: none; border: none;
    color: var(--f1-muted);
    font-size: clamp(0.78rem, 2vw, 0.88rem);
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  nav button:active { background: rgba(255,255,255,0.04); }
  nav button.active { color: #fff; border-bottom-color: var(--f1-red); }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: clamp(16px, 3vw, 28px) 14px;
  }

  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  h2 {
    font-size: clamp(1.05rem, 3vw, 1.3rem);
    margin-bottom: 16px;
    padding-left: 12px;
    border-left: 3px solid var(--f1-red);
    letter-spacing: -0.3px;
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: linear-gradient(135deg, var(--f1-card) 0%, var(--f1-card2) 100%);
    border: 1px solid var(--f1-border);
    border-radius: 12px;
    padding: clamp(14px, 2vw, 20px);
    text-align: center;
    transition: border-color 0.2s;
  }
  .stat-card .label {
    font-size: 0.68rem;
    color: var(--f1-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-card .value {
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    font-weight: 800;
  }

  /* Tables — polished */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 12px;
    border: 1px solid var(--f1-border);
    margin-bottom: 22px;
    background: var(--f1-card);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: clamp(0.72rem, 1.8vw, 0.85rem);
  }
  th {
    background: rgba(255,255,255,0.03);
    color: var(--f1-muted);
    font-weight: 600;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 11px 14px;
    text-align: left;
    white-space: nowrap;
    border-bottom: 1px solid var(--f1-border);
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(42,42,62,0.5);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  tr:active td { background: rgba(225,6,0,0.06); }
  .pos-1 { color: var(--gold); font-weight: 800; }
  .pos-2 { color: var(--silver); font-weight: 700; }
  .pos-3 { color: var(--bronze); font-weight: 700; }

  .team-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  .team-mercedes { background: #00D2BE; color: #000; }
  .team-ferrari { background: #DC0000; color: #fff; }
  .team-mclaren { background: #FF8700; color: #000; }
  .team-redbull { background: #3671C6; color: #fff; }
  .team-alpine { background: #0093CC; color: #fff; }
  .team-haas { background: #B6BABD; color: #000; }
  .team-racingbulls { background: #6692FF; color: #fff; }
  .team-williams { background: #005AFF; color: #fff; }
  .team-audi { background: #4CAF50; color: #000; }
  .team-cadillac { background: #1A1A2E; color: #E0C068; border: 1px solid #E0C068; }
  .team-astonmartin { background: #006F62; color: #fff; }

  /* Calendar */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  @media (max-width: 600px) {
    .calendar-grid { grid-template-columns: 1fr; }
  }

  .race-card {
    background: linear-gradient(160deg, var(--f1-card) 0%, var(--f1-card2) 100%);
    border: 1px solid var(--f1-border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  .race-card:active { border-color: var(--f1-red); transform: scale(0.98); }
  .race-card .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .race-card .flag { font-size: 1.5rem; flex-shrink: 0; line-height: 1.1; }
  .race-card .card-info { flex: 1; min-width: 0; }
  .race-card .card-info .name { font-weight: 700; font-size: 0.85rem; line-height: 1.2; }
  .race-card .card-info .track { font-size: 0.6rem; color: var(--f1-muted); margin-top: 2px; }
  .race-card .card-info .sub { font-size: 0.62rem; color: var(--f1-muted); margin-top: 1px; }
  .race-card .card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .race-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.58rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    line-height: 1.4;
  }
  .race-badge.rnd { background: rgba(255,255,255,0.06); color: var(--f1-muted); text-transform: uppercase; letter-spacing: 1px; }
  .race-badge.done { background: rgba(76,175,80,0.12); color: #4CAF50; }
  .race-badge.sprint { background: rgba(255,152,0,0.12); color: #FF9800; }

  .race-card .schedule {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.15);
    border-radius: 8px;
  }
  .race-card .sched-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.62rem;
  }
  .race-card .sched-line .s-label { flex-shrink: 0; font-weight: 600; font-size: 0.6rem; }
  .race-card .sched-line .s-time { flex-shrink: 0; }
  .race-card .sched-line.race .s-label { color: var(--f1-red); }
  .race-card .sched-line.race .s-time { color: var(--f1-red); font-weight: 700; font-size: 0.67rem; }
  .race-card .sched-line.quali { color: var(--f1-muted); }
  .race-card .sched-line.sprint { color: #FF9800; }
  .race-card .podium {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.12);
    border-radius: 8px;
  }
  .race-card .podium .p-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.6rem;
    overflow: hidden;
    white-space: nowrap;
  }
  .race-card .podium .p-name { overflow: hidden; text-overflow: ellipsis; }
  .race-card .podium .p-medal {
    width: 15px; height: 15px; min-width: 15px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.5rem; font-weight: 900; line-height: 1;
  }
  .p-medal.gold { background: #FFD700; color: #000; }
  .p-medal.silver { background: #C0C0C0; color: #000; }
  .p-medal.bronze { background: #CD7F32; color: #fff; }
  .race-card.completed { opacity: 0.5; }
  .race-card.next-up {
    border-left: 3px solid var(--f1-red);
    box-shadow: 0 0 16px rgba(225,6,0,0.06), inset 0 1px 0 rgba(255,255,255,0.02);
  }

  /* Tech cards */
  .tech-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }
  .tech-card {
    background: linear-gradient(160deg, var(--f1-card) 0%, var(--f1-card2) 100%);
    border: 1px solid var(--f1-border);
    border-radius: 12px;
    padding: clamp(14px, 2vw, 20px);
    transition: border-color 0.2s;
  }
  .tech-card:hover { border-color: rgba(225,6,0,0.15); }
  .tech-card h3 {
    font-size: clamp(0.82rem, 2vw, 0.92rem);
    margin-bottom: 10px;
  }
  .tech-card .spec {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(42,42,62,0.4);
    font-size: clamp(0.7rem, 1.8vw, 0.8rem);
    gap: 12px;
  }
  .tech-card .spec:last-child { border-bottom: none; }
  .tech-card .spec-label { color: var(--f1-muted); flex-shrink: 0; }

  .loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--f1-muted);
  }
  .loading-spinner .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--f1-border);
    border-top-color: var(--f1-red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(180,0,0,0.12);
    border: 1px solid rgba(139,0,0,0.4);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: #FFAAAA;
  }

  .footer {
    text-align: center;
    padding: 24px;
    color: var(--f1-muted);
    font-size: 0.68rem;
    border-top: 1px solid var(--f1-border);
    margin-top: 20px;
    letter-spacing: 0.3px;
  }

  .btn-retry {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 16px;
    background: var(--f1-red);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
  }

  /* Section-header accent labels */
  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    margin: 20px 0 8px 0;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .section-label.up { color: var(--f1-red); }
  .section-label.past { color: var(--f1-muted); }
</style>
</head>

const CACHE_KEY = 'f1_2026_cache';
const CACHE_TTL = 60 * 60 * 1000;

function setStatus(state, text) {
  var dot = document.getElementById('refreshDot');
  dot.className = 'dot';
  if (state === 'loading') dot.classList.add('loading');
  else if (state === 'stale') dot.classList.add('stale');
  document.getElementById('refreshLabel').textContent = text;
}

function getCache() {
  try {
    var raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    var cache = JSON.parse(raw);
    if (Date.now() - cache.ts > CACHE_TTL) return null;
    return cache.data;
  } catch(e) { return null; }
}

function setCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data }));
  } catch(e) {}
}

var teamMap = {};
TEAMS.forEach(function(t) { teamMap[t.name.toLowerCase().replace(/[^a-z]/g,'')] = t; });

function getTeamCls(teamName) {
  if (!teamName) return '';
  var key = teamName.toLowerCase().replace(/[^a-z]/g,'');
  var t = teamMap[key];
  return t ? t.cls : '';
}

function renderStandings(data) {
  var drivers = data.drivers || [];
  var constructors = data.constructors || [];
  var leader = drivers[0] || {};
  var wins = leader.wins || 0;

  // Compute from CALENDAR — always accurate as long as data is updated
  var completedRaces = 0;
  var lastCompleted = null;
  for (var i = 0; i < CALENDAR.length; i++) {
    if (CALENDAR[i].done) {
      completedRaces++;
      lastCompleted = CALENDAR[i];
    }
  }
  var totalRaces = CALENDAR.length;
  var updateText = lastCompleted ? (lastCompleted.name + ' · ' + new Date().toLocaleDateString('zh-CN')) : new Date().toLocaleDateString('zh-CN');

  var html = '';
  html += '<div class="stats-row">';
  html += '<div class="stat-card"><div class="label">领跑者</div><div class="value">' + esc(leader.driver || '—') + '</div></div>';
  html += '<div class="stat-card"><div class="label">积分</div><div class="value">' + (leader.points || '—') + '</div></div>';
  html += '<div class="stat-card"><div class="label">分站冠军</div><div class="value">' + wins + '</div></div>';
  html += '<div class="stat-card"><div class="label">剩余分站</div><div class="value">' + (totalRaces - completedRaces) + '</div></div>';
  html += '</div>';

  html += '<h2>车手积分榜</h2><div class="table-wrap"><table>';
  html += '<thead><tr><th>#</th><th>车手</th><th>车队</th><th>🏆 冠军</th><th>积分</th></tr></thead><tbody>';
  for (var i = 0; i < drivers.length; i++) {
    var d = drivers[i];
    var pcls = i < 3 ? ' pos-' + (i + 1) : '';
    html += '<tr><td class="' + pcls + '">' + (i + 1) + '</td>';
    html += '<td><strong>' + esc(d.driver) + '</strong></td>';
    html += '<td><span class="team-tag ' + getTeamCls(d.team) + '">' + esc(d.team) + '</span></td>';
    html += '<td>' + (d.wins || 0) + '</td>';
    html += '<td><strong>' + esc(d.points) + '</strong></td></tr>';
  }
  html += '</tbody></table></div>';

  html += '<h2>车队积分榜</h2><div class="table-wrap"><table>';
  html += '<thead><tr><th>#</th><th>车队</th><th>车手阵容</th><th>积分</th></tr></thead><tbody>';
  for (var j = 0; j < constructors.length; j++) {
    var c = constructors[j];
    var pc = j < 3 ? ' pos-' + (j + 1) : '';
    html += '<tr><td class="' + pc + '">' + (j + 1) + '</td>';
    html += '<td><strong>' + esc(c.team) + '</strong></td>';
    html += '<td>' + esc(c.drivers || '') + '</td>';
    html += '<td><strong>' + esc(c.points) + '</strong></td></tr>';
  }
  html += '</tbody></table></div>';

  html += '<p style="font-size:0.68rem;color:var(--f1-muted);text-align:center;margin-top:8px;">数据更新至 ' + updateText + ' · 本页生成于 ' + new Date().toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}) + '</p>';

  document.getElementById('standingsContent').innerHTML = html;
}

function posClass(i) { return i === 1 ? 'pos-1' : i === 2 ? 'pos-2' : i === 3 ? 'pos-3' : ''; }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCalendar() {
  var upcoming = [];
  var completed = [];
  for (var i = 0; i < CALENDAR.length; i++) {
    if (CALENDAR[i].done) completed.push(CALENDAR[i]);
    else upcoming.push(CALENDAR[i]);
  }

  var html = '<h2>2026 赛历 · 24 场分站</h2>';

  // Upcoming first
  html += '<div class="section-label up">即将举行 · ' + upcoming.length + ' 场</div>';
  html += '<div class="calendar-grid">';
  for (var u = 0; u < upcoming.length; u++) {
    var r = upcoming[u];
    var cardCls = u === 0 ? 'race-card next-up' : 'race-card';
    html += '<div class="' + cardCls + '">';
    html += '<div class="card-top">';
    html += '<div class="flag">' + r.flag + '</div>';
    html += '<div class="card-info">';
    html += '<div class="name">' + r.name + '</div>';
    html += '<div class="track">' + r.en + ' · ' + r.track + '</div>';
    html += '<div class="sub">' + r.date + ' · ' + r.venue + '</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="card-badges">';
    html += '<span class="race-badge rnd">R' + r.r + '</span>';
    if (r.sprint) {
      html += '<span class="race-badge sprint">🏃 冲刺赛</span>';
    }
    html += '</div>';
    html += '<div class="schedule">';
    html += '<div class="sched-line race"><span class="s-label">🏁 正赛</span><span class="s-time">' + r.time + '</span></div>';
    html += '<div class="sched-line quali"><span class="s-label">⏱ 排位赛</span><span class="s-time">' + r.quali + '</span></div>';
    if (r.sprint) {
      html += '<div class="sched-line sprint"><span class="s-label">⚡ 冲刺排位</span><span class="s-time">' + r.sprintQuali + '</span></div>';
      html += '<div class="sched-line sprint"><span class="s-label">🏃 冲刺赛</span><span class="s-time">' + r.sprintRace + '</span></div>';
    }
    html += '</div>';
    html += '</div>';
  }
  html += '</div>';

  // Completed below
  html += '<div class="section-label past">已结束 · ' + completed.length + ' 场</div>';
  html += '<div class="calendar-grid">';
  for (var c = 0; c < completed.length; c++) {
    var r2 = completed[c];
    html += '<div class="race-card completed">';
    html += '<div class="card-top">';
    html += '<div class="flag">' + r2.flag + '</div>';
    html += '<div class="card-info">';
    html += '<div class="name">' + r2.name + '</div>';
    html += '<div class="track">' + r2.track + '</div>';
    html += '<div class="sub">' + r2.date + ' · ' + r2.venue + '</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="card-badges">';
    html += '<span class="race-badge done">✓ 已完成</span>';
    if (r2.sprint) {
      html += '<span class="race-badge sprint">🏃 冲刺赛</span>';
    }
    html += '</div>';
    if (r2.podium && r2.podium.length >= 3) {
      html += '<div class="podium">';
      html += '<div class="p-line"><span class="p-medal gold">1</span><span class="p-name">' + esc(r2.podium[0]) + '</span></div>';
      html += '<div class="p-line"><span class="p-medal silver">2</span><span class="p-name">' + esc(r2.podium[1]) + '</span></div>';

      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  document.getElementById('calendar').innerHTML = html;
}

}
