<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>F1 2026 · 实时积分</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --f1-red: #E10600;
  --f1-red-soft: #FF2A24;
  --f1-deep: #080810;
  --f1-card: #11111D;
  --f1-card-hover: #17172A;
  --f1-border: #1E1E32;
  --f1-text: #EAEAEE;
  --f1-muted: #6B6B83;
  --gold: #FFD700; --silver: #C8C8D0; --bronze: #CD7F32;
  --accent-green: #00E676;
  --accent-orange: #FF9100;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Noto Sans SC', -apple-system, system-ui, sans-serif;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.15);
  --shadow-pulse: 0 0 18px rgba(225,6,0,0.12), 0 0 36px rgba(225,6,0,0.04);
  --transition-fast: 0.18s cubic-bezier(0.4,0,0.2,1);
  --transition-smooth: 0.3s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--f1-deep); color: var(--f1-text);
  font-family: var(--font-body); line-height:1.6; min-height:100vh;
  -webkit-text-size-adjust:100%;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(225,6,0,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 15%, rgba(225,6,0,0.03) 0%, transparent 45%),
    radial-gradient(ellipse at 15% 80%, rgba(0,230,118,0.02) 0%, transparent 40%);
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.4;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.005) 60px, rgba(255,255,255,0.005) 61px),
    repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.005) 60px, rgba(255,255,255,0.005) 61px);
}

/* Hero */
.hero {
  position:relative; overflow:hidden;
  background: linear-gradient(160deg, #0A0610 0%, #180812 35%, var(--f1-deep) 55%, #1A0A0E 78%, var(--f1-red) 100%);
  padding: clamp(32px, 6vw, 56px) 16px clamp(24px, 5vw, 40px); text-align:center;
}
.hero::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(225,6,0,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 50%, rgba(225,6,0,0.06) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 80%, rgba(255,215,0,0.03) 0%, transparent 30%);
}
.hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background: repeating-linear-gradient(90deg, var(--f1-red) 0px, var(--f1-red) 20px, #fff 20px, #fff 40px, var(--accent-green) 40px, var(--accent-green) 60px, #fff 60px, #fff 80px); opacity:0.8; }
.hero h1 {
  font-family:var(--font-display); font-size:clamp(1.8rem, 5.5vw, 2.6rem); font-weight:900;
  letter-spacing:-0.5px; position:relative; margin-bottom:4px;
  background: linear-gradient(180deg, #fff 0%, #E0E0E8 60%, var(--f1-red) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  text-shadow:none; filter: drop-shadow(0 0 20px rgba(225,6,0,0.35));
}
.hero .sub { position:relative; font-size:clamp(0.78rem,2vw,0.88rem); opacity:0.78; font-weight:500; letter-spacing:4px; }
.hero .hero-meta { position:relative; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:10px; margin-top:12px; }

/* Countdown */
.hero-countdown {
  display:inline-flex; align-items:center; gap:7px;
  padding:6px 16px; background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.08);
  border-radius:24px; font-size:0.7rem; backdrop-filter:blur(10px);
}
.hero-countdown .cd-label { font-family:var(--font-display); font-size:0.5rem; color:var(--f1-muted); letter-spacing:1.5px; text-transform:uppercase; }
.hero-countdown .cd-time { font-family:var(--font-display); font-weight:700; font-size:0.82rem; color:var(--accent-green); }
.hero-countdown .cd-time.urgent { color:var(--accent-orange); animation:urgentPulse 1.5s infinite; }
@keyframes urgentPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.hero-countdown .cd-flag { font-size:1.1rem; }

/* Refresh badge */
.refresh-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 14px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.06); border-radius:24px; font-size:0.6rem; opacity:0.85; backdrop-filter:blur(8px); }
.refresh-badge .dot { width:5px; height:5px; border-radius:50%; background:var(--accent-green); box-shadow:0 0 6px var(--accent-green); }
.refresh-badge .dot.stale { background:#FF9800; box-shadow:0 0 6px #FF9800; }
.refresh-badge .dot.loading { background:#FFC107; box-shadow:0 0 6px #FFC107; animation:pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Particle layer */
.particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
.particle { position:absolute; width:2px; height:2px; background:rgba(225,6,0,0.3); border-radius:50%; animation:floatUp linear infinite; }
@keyframes floatUp { 0%{opacity:0;transform:translateY(100%) scale(1)} 20%{opacity:0.6} 80%{opacity:0.4} 100%{opacity:0;transform:translateY(-100%) scale(0.3)} }

/* Nav */
nav { background:rgba(10,10,20,0.88); position:sticky; top:0; z-index:100; backdrop-filter:blur(16px); border-bottom:1px solid rgba(225,6,0,0.15); }
nav .tabs { display:flex; max-width:900px; margin:0 auto; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
nav .tabs::-webkit-scrollbar { display:none; }
nav button {
  flex:1; min-width:fit-content; padding:14px 22px; background:none; border:none;
  color:var(--f1-muted); font-family:var(--font-body); font-size:0.82rem; font-weight:700;
  cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
  transition:color var(--transition-fast),border-color var(--transition-fast);
  -webkit-tap-highlight-color:transparent; position:relative;
}
nav button:hover { color:var(--f1-text); }
nav button:active { background:rgba(255,255,255,0.02); }
nav button { position:relative; }
nav button::before {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:0; height:2px; background:var(--f1-red); border-radius:1px;
  transition:width var(--transition-fast);
}
nav button.active { color:#fff; }
nav button.active::before { width:24px; }

.container { max-width:920px; margin:0 auto; padding:clamp(22px, 3.5vw, 34px) 16px; position:relative; z-index:1; }
.section { display:none; }
.section.active { display:block; animation:sectionIn 0.35s ease; }
@keyframes sectionIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

h2 { font-family:var(--font-display); font-size:clamp(0.85rem, 2.5vw, 1rem); font-weight:700; margin-bottom:14px; padding-left:12px; border-left:3px solid var(--f1-red); letter-spacing:0.3px; text-transform:uppercase; }

/* Skeleton shimmer */
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
.skeleton { background:linear-gradient(90deg, var(--f1-card) 25%, rgba(30,30,50,0.6) 37%, var(--f1-card) 63%); background-size:200% 100%; animation:shimmer 1.6s ease-in-out infinite; border-radius:var(--radius-sm); }
.skeleton-row { display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:8px; margin-bottom:3px; }
.skeleton-circle { width:28px;height:28px; border-radius:6px; flex-shrink:0; }
.skeleton-line { height:10px; border-radius:4px; flex:1; }
.skeleton-line.short { flex:0 0 60px; }

/* Stats row */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:26px; }
@media(max-width:480px){ .stats-row { grid-template-columns:repeat(2,1fr); gap:6px; } }
.stat-card {
  background:var(--f1-card); border:1px solid var(--f1-border); border-radius:var(--radius-md);
  padding:14px 10px; text-align:center; position:relative; overflow:hidden;
  transition:border-color var(--transition-fast),transform var(--transition-fast),box-shadow var(--transition-fast);
  animation:cardPop 0.45s ease backwards; box-shadow:var(--shadow-card);
}
.stat-card:hover { border-color:rgba(225,6,0,0.2); transform:translateY(-1px); box-shadow:var(--shadow-pulse); }
.stat-card:nth-child(1){ animation-delay:0.05s; } .stat-card:nth-child(2){ animation-delay:0.1s; } .stat-card:nth-child(3){ animation-delay:0.15s; } .stat-card:nth-child(4){ animation-delay:0.2s; }
@keyframes cardPop { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
.stat-card::after { content:''; position:absolute; top:0; left:15%; right:15%; height:1.5px; background:linear-gradient(90deg,transparent 0%,var(--f1-red) 50%,transparent 100%); opacity:0.25; }
.stat-card .label { font-family:var(--font-display); font-size:0.5rem; color:var(--f1-muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; }
.stat-card .value { font-family:var(--font-display); font-size:clamp(0.95rem,2.2vw,1.35rem); font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.stat-card .stat-unit { font-size:clamp(0.6rem,1.5vw,0.8rem); font-weight:500; color:var(--f1-muted); margin-left:2px; }
.stat-card .sub-value { font-size:0.55rem; color:var(--f1-muted); margin-top:2px; }

/* Standings */
.standings-list { display:flex; flex-direction:column; gap:3px; margin-bottom:24px; }
.s-row {
  display:flex; align-items:center; gap:10px;
  background:var(--f1-card); border:1px solid var(--f1-border);
  border-radius:var(--radius-sm); padding:10px 12px;
  transition:border-color var(--transition-fast),background var(--transition-fast),transform var(--transition-fast);
  min-width:0; animation:slideUp 0.3s ease backwards; cursor:default; box-shadow:var(--shadow-card);
}
@keyframes slideUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.s-row:hover { background:var(--f1-card-hover); border-color:rgba(255,255,255,0.04); transform:translateX(2px); }
.s-row:active { border-color:var(--f1-border); transform:scale(0.992); }
.s-row.s-podium { border-color:rgba(255,255,255,0.06); background:rgba(255,255,255,0.02); }
.s-row.s-podium:nth-child(1) { border-color:rgba(255,215,0,0.15); }
.s-row.s-podium:nth-child(2) { border-color:rgba(200,200,208,0.1); }
.s-row.s-podium:nth-child(3) { border-color:rgba(205,127,50,0.1); }
.s-row .s-pos-w { width:30px; min-width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:0.78rem; flex-shrink:0; background:rgba(255,255,255,0.03); color:var(--f1-muted); }
.s-row .s-pos-w.p1 { background:rgba(255,215,0,0.1); color:var(--gold); font-size:0.85rem; }
.s-row .s-pos-w.p2 { background:rgba(200,200,208,0.08); color:var(--silver); }
.s-row .s-pos-w.p3 { background:rgba(205,127,50,0.1); color:var(--bronze); }
.s-row .s-info { flex:1; min-width:0; }
.s-row .s-name { font-weight:700; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.s-row .s-sub { font-size:0.56rem; color:var(--f1-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
.s-row .s-meta { display:flex; align-items:center; gap:10px; flex-shrink:0; font-size:0.56rem; color:var(--f1-muted); }
.s-row .s-pts { font-family:var(--font-display); font-weight:700; font-size:0.95rem; min-width:38px; text-align:right; color:var(--f1-text); }
.s-row .s-trend { font-size:0.65rem; min-width:14px; text-align:center; }
.s-row .s-trend.up { color:var(--accent-green); }
.s-row .s-trend.down { color:var(--f1-red); }

.team-tag { display:inline-block; padding:2px 7px; border-radius:3px; font-size:0.62rem; font-weight:700; letter-spacing:0.2px; }
.team-mercedes{background:#00D2BE;color:#000}.team-ferrari{background:#DC0000;color:#fff}.team-mclaren{background:#FF8700;color:#000}.team-redbull{background:#3671C6;color:#fff}.team-alpine{background:#0093CC;color:#fff}.team-haas{background:#B6BABD;color:#000}.team-racingbulls{background:#6692FF;color:#fff}.team-williams{background:#005AFF;color:#fff}.team-audi{background:#4CAF50;color:#000}.team-cadillac{background:#1A1A2E;color:#E0C068;border:1px solid #E0C068}.team-astonmartin{background:#006F62;color:#fff}

/* Team cards */
.team-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
.t-card {
  background:var(--f1-card); border:1px solid var(--f1-border); border-radius:var(--radius-md);
  overflow:hidden; box-shadow:var(--shadow-card);
  transition:border-color var(--transition-fast),transform var(--transition-fast);
}
.t-card:hover { border-color:rgba(225,6,0,0.18); transform:translateY(-1px); }
.t-card:active { border-color:var(--f1-red); transform:scale(0.985); }

.team-main { display:flex; align-items:center; justify-content:space-between; padding:16px; gap:10px; }
.team-left { display:flex; align-items:center; gap:14px; flex:1; min-width:0; }
.team-rank { width:32px;height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:0.78rem; font-weight:900; flex-shrink:0; background:rgba(255,255,255,0.03); color:var(--f1-muted); }
.team-rank.r1 { background:linear-gradient(135deg,rgba(255,215,0,0.18),rgba(255,215,0,0.05)); color:var(--gold); }
.team-rank.r2 { background:linear-gradient(135deg,rgba(200,200,208,0.1),rgba(200,200,208,0.03)); color:var(--silver); }
.team-rank.r3 { background:linear-gradient(135deg,rgba(205,127,50,0.12),rgba(205,127,50,0.03)); color:var(--bronze); }
.team-meta { flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
.team-name-row { display:flex; align-items:center; gap:8px; }
.team-sub { display:flex; flex-wrap:wrap; gap:3px 10px; font-size:0.58rem; color:var(--f1-muted); }
.team-drivers { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.team-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; margin-left:auto; }
.team-pts { font-family:var(--font-display); font-size:1.1rem; font-weight:900; line-height:1; }
.team-pts-label { font-size:0.45rem; font-weight:700; color:var(--f1-muted); margin-left:3px; }
.team-wins-label { font-size:0.5rem; color:var(--f1-muted); letter-spacing:0.5px; }

.t-card .t-detail { display:none; padding:0 16px 16px; flex-direction:column; gap:8px; }
.t-card.expanded .t-detail { display:flex; animation:fadeSlide 0.25s ease; }
.t-card .t-detail .td-row { display:flex; justify-content:space-between; align-items:center; font-size:0.65rem; padding:8px 10px; background:rgba(0,0,0,0.14); border-radius:var(--radius-sm); gap:8px; }
.t-card .t-detail .td-row .td-l { color:var(--f1-muted); font-family:var(--font-display); font-size:0.46rem; text-transform:uppercase; letter-spacing:0.8px; flex-shrink:0; }
.t-card .t-detail .td-row .td-v { text-align:right; font-weight:600; }
.t-card .t-toggle { display:flex; align-items:center; justify-content:center; gap:5px; padding:12px 0; font-size:0.54rem; color:var(--f1-muted); cursor:pointer; font-family:var(--font-display); letter-spacing:1px; text-transform:uppercase; transition:color var(--transition-fast); border-top:1px solid rgba(255,255,255,0.03); margin:0 16px; }
.t-card .t-toggle:hover { color:var(--f1-text); }
.t-card .t-toggle .t-arrow { transition:transform var(--transition-fast); font-size:0.48rem; display:inline-block; }
.t-card.expanded .t-toggle .t-arrow { transform:rotate(180deg); }

/* Calendar */
.calendar-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
@media(max-width:600px){ .calendar-grid{grid-template-columns:1fr;} }
.r-card {
  background:var(--f1-card); border:1px solid var(--f1-border); border-radius:var(--radius-md);
  padding:14px; display:flex; flex-direction:column; gap:8px;
  transition:border-color var(--transition-fast),background var(--transition-fast),transform var(--transition-fast),box-shadow var(--transition-fast);
  animation:cardPop 0.4s ease backwards; cursor:default; box-shadow:var(--shadow-card);
}
.r-card:hover { border-color:rgba(225,6,0,0.15); transform:translateY(-1px); }
.r-card:active { border-color:var(--f1-red); transform:scale(0.985); }
.r-card .r-top { display:flex; align-items:flex-start; gap:10px; }
.r-card .r-flag { font-size:1.4rem; flex-shrink:0; line-height:1; }
.r-card .r-info { flex:1; min-width:0; }
.r-card .r-info .r-name { font-weight:700; font-size:0.8rem; line-height:1.3; }
.r-card .r-info .r-track { font-size:0.55rem; color:var(--f1-muted); margin-top:2px; }
.r-card .r-badges { display:flex; flex-wrap:wrap; gap:4px; }
.r-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:3px; font-family:var(--font-display); font-size:0.49rem; font-weight:700; letter-spacing:0.5px; line-height:1.4; }
.r-badge.rnd{background:rgba(255,255,255,0.04);color:var(--f1-muted)}.r-badge.done{background:rgba(0,230,118,0.06);color:var(--accent-green)}.r-badge.sprint{background:rgba(255,145,0,0.08);color:var(--accent-orange)}.r-badge.live{background:rgba(225,6,0,0.15);color:var(--f1-red);animation:livePulse 2s infinite}
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.r-card .r-sched { display:flex; flex-direction:column; gap:3px; padding:8px 10px; background:rgba(0,0,0,0.2); border-radius:var(--radius-sm); }
.r-card .r-sched .sl { display:flex; align-items:center; gap:8px; font-size:0.55rem; }
.r-card .r-sched .sl .sl-l { flex-shrink:0; font-weight:700; width:46px; font-size:0.5rem; }
.r-card .r-sched .sl.race .sl-l { color:var(--f1-red); }
.r-card .r-sched .sl.race .sl-t { color:var(--f1-red); font-weight:700; }
.r-card .r-sched .sl.quali { color:var(--f1-muted); }
.r-card .r-sched .sl.sprint { color:var(--accent-orange); }

/* Expand toggle */
.r-card .r-toggle { display:flex; align-items:center; justify-content:center; gap:5px; padding:4px 0 0; font-size:0.54rem; color:var(--f1-muted); cursor:pointer; font-family:var(--font-display); letter-spacing:1px; text-transform:uppercase; transition:color var(--transition-fast); }
.r-card .r-toggle:hover { color:var(--f1-text); }
.r-card .r-toggle .t-arrow { display:inline-block; transition:transform var(--transition-fast); font-size:0.48rem; }
.r-card.expanded .r-toggle .t-arrow { transform:rotate(180deg); }

/* Race detail panel */
.r-detail { display:none; flex-direction:column; gap:6px; }
.r-card.expanded .r-detail { display:flex; animation:fadeSlide 0.25s ease; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.r-detail .d-block { padding:8px 10px; background:rgba(0,0,0,0.14); border-radius:var(--radius-sm); }
.r-detail .d-title { font-family:var(--font-display); font-size:0.49rem; color:var(--f1-muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:5px; }
.r-detail .d-row { display:flex; align-items:center; gap:6px; font-size:0.54rem; padding:2px 0; }
.r-detail .d-row .d-pos { width:18px; text-align:center; font-weight:700; color:var(--f1-muted); flex-shrink:0; }
.r-detail .d-row .d-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.r-detail .d-row .d-time { font-family:var(--font-display); font-size:0.49rem; color:var(--f1-muted); flex-shrink:0; }
.r-detail .d-info { font-size:0.54rem; color:var(--f1-muted); line-height:1.7; }
.r-detail .d-loading { text-align:center; padding:8px; color:var(--f1-muted); font-size:0.54rem; }
.r-detail .d-spinner { width:16px; height:16px; border:2px solid var(--f1-border); border-top-color:var(--f1-red); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 6px; }
@keyframes spin { to { transform:rotate(360deg); } }

.r-card.completed { opacity:0.5; }
.r-card.completed:hover { opacity:0.7; }

/* Champion banner */

  var pointGap = leader.points && second.points ? (leader.points - second.points) : 0;
  var wins = leader.wins || 0;
  // Count total wins across all drivers
  var totalWins = 0;
  for (var wi = 0; wi < drivers.length; wi++) { totalWins += drivers[wi].wins || 0; }
  var cal = currentCalendar();
  var completedRaces = 0, lastCompleted = null;
  for (var i = 0; i < cal.length; i++) { if (cal[i].done) { completedRaces++; lastCompleted = cal[i]; } }
  var totalRaces = cal.length;
  var updateText = lastCompleted ? (lastCompleted.name + ' · ' + new Date().toLocaleDateString('zh-CN')) : new Date().toLocaleDateString('zh-CN');

  // Get constructor leader
  var leaderConstructor = constructors.length ? constructors[0].team : '—';
  var constructorWins = constructors.length ? (constructors[0].wins || 0) : 0;

  var html = '';
  html += '<div class="stats-row">';
  html += '<div class="stat-card"><div class="label">2026 赛季领跑者</div><div class="value">' + (leader.driver ? shortName(leader.driver) : '—') + '</div><div class="sub-value">' + esc(leader.team || '') + '</div></div>';
  html += '<div class="stat-card"><div class="label">领跑积分</div><div class="value">' + (leader.points || '—') + '</div><div class="sub-value">领先 P2 ' + pointGap + ' 分</div></div>';
  html += '<div class="stat-card"><div class="label">赛季进度</div><div class="value">' + completedRaces + '<span class="stat-unit">/' + totalRaces + '</span></div><div class="sub-value">已完成 / 总站数</div></div>';
  html += '<div class="stat-card"><div class="label">领跑车队</div><div class="value">' + esc(leaderConstructor) + '</div><div class="sub-value">' + esc(constructors[0] && constructors[0].points ? constructors[0].points + ' 分' : '') + '</div></div>';
  html += '</div>';

  // Compute rank changes
  var newRanks = {};
  for (var i = 0; i < drivers.length; i++) { newRanks[drivers[i].driver] = i; }

  html += '<h2>车手积分榜</h2><div class="standings-list">';
  for (var i = 0; i < drivers.length; i++) {
    var d = drivers[i], pc = posCls(i);
    var trendHtml = '';
    if (PREV_RANKS[d.driver] !== undefined) {
      var diff = PREV_RANKS[d.driver] - i;
      if (diff > 0) trendHtml = '<span class="s-trend up">▲' + diff + '</span>';
      else if (diff < 0) trendHtml = '<span class="s-trend down">▼' + Math.abs(diff) + '</span>';
    }
    html += '<div class="s-row' + (i < 3 ? ' s-podium' : '') + '" style="animation-delay:' + (i * 0.015) + 's">';
    html += '<div class="s-pos-w ' + pc + '">' + (i + 1) + '</div>';
    html += '<div class="s-info"><div class="s-name">' + esc(d.driver) + '</div><div class="s-sub">' + esc(d.team) + '</div></div>';
    html += trendHtml;
    html += '<div class="s-meta">🏆 ' + (d.wins || 0) + '</div>';
    html += '<div class="s-pts">' + esc(d.points) + '</div></div>';
  }
  html += '</div>';

  html += '<h2>车队积分榜</h2><div class="standings-list">';
  for (var j = 0; j < constructors.length; j++) {
    var c = constructors[j], pc = posCls(j), tCls = c._cls || getTeamCls(c.team);
    html += '<div class="s-row' + (j < 3 ? ' s-podium' : '') + '" style="animation-delay:' + (j * 0.015) + 's">';
    html += '<div class="s-pos-w ' + pc + '">' + (j + 1) + '</div>';
    html += '<div class="s-info"><div class="s-name">' + (tCls ? '<span class="team-tag ' + tCls + '">' + esc(c.team) + '</span>' : esc(c.team)) + '</div><div class="s-sub">' + esc(c.drivers || '') + '</div></div>';
    html += '<div class="s-pts" style="min-width:42px;">' + esc(c.points) + '</div></div>';
  }
  html += '</div>';
  html += '<p style="font-size:0.56rem;color:var(--f1-muted);text-align:center;margin-top:4px;">更新至 ' + updateText + ' · ' + new Date().toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}) + '</p>';
  document.getElementById('standingsContent').innerHTML = html;
  PREV_RANKS = newRanks;
}

function renderCalendar() {
  var cal = currentCalendar();
  var upcoming = [], completed = [];
  for (var i = 0; i < cal.length; i++) {
    if (cal[i].done) completed.push(cal[i]); else upcoming.push(cal[i]);
  }
  // Reverse completed so most recent race appears first
  var completedReversed = [];
  for (var ci = completed.length - 1; ci >= 0; ci--) { completedReversed.push(completed[ci]); }

  var html = '';

  // Year selector
  html += '<div class="year-tabs">';
  var years = [2026, 2025, 2024, 2023, 2022];
  for (var yi = 0; yi < years.length; yi++) {
    var y = years[yi];
    var status = '';
    if (CALENDARS[y] && CALENDARS[y].length) {
      var doneCount = 0;
      for (var di = 0; di < CALENDARS[y].length; di++) { if (CALENDARS[y][di].done) doneCount++; }
      status = doneCount + '/' + CALENDARS[y].length + ' 站已完成';
    } else {
      status = '加载中…';
    }
    html += '<button class="year-tab' + (y === CALENDAR_YEAR ? ' active' : '') + '" onclick="switchYear(' + y + ')">' + y + '<span class="yr-status">' + status + '</span></button>';
  }
  html += '</div>';

  if (!cal.length) {
    html += '<p style="text-align:center;color:var(--f1-muted);padding:48px 0;">数据正在加载中…</p>';
    document.getElementById('calendarContent').innerHTML = html;
    return;
  }

  html += '<h2>' + CALENDAR_YEAR + ' 赛历 · ' + cal.length + ' 站</h2>';

  // Sub-tabs — default to "past" for completed years, "upcoming" for current year
  var defaultTab = (upcoming.length === 0) ? 'past' : 'upcoming';
  html += '<div class="cal-tabs">';
  html += '<button class="cal-tab' + (defaultTab === 'upcoming' ? ' active' : '') + '" onclick="switchCalTab(\'upcoming\')">即将举行 · ' + upcoming.length + '</button>';
  html += '<button class="cal-tab' + (defaultTab === 'past' ? ' active' : '') + '" onclick="switchCalTab(\'past\')">已结束 · ' + completed.length + '</button>';
  html += '</div>';

  // Upcoming section
  html += '<div class="cal-section' + (defaultTab === 'upcoming' ? ' active' : '') + '" id="cal-upcoming"><div class="calendar-grid">';
  for (var u = 0; u < upcoming.length; u++) {
    html += raceCardHTML(upcoming[u], u === 0);
  }
  html += '</div></div>';

  // Past section
  html += '<div class="cal-section' + (defaultTab === 'past' ? ' active' : '') + '" id="cal-past"><div class="calendar-grid">';

  // Champion banner for past years
  if (CALENDAR_YEAR < 2026) {
    var champ = CHAMPIONS[CALENDAR_YEAR] || null;
    html += '<div class="champion-banner" id="championBanner">';
    if (champ && champ.length) {
      html += '<div class="champ-header">' + CALENDAR_YEAR + ' 赛季总冠军</div>';
      for (var chi = 0; chi < champ.length; chi++) {
        var c = champ[chi];
        html += '<div class="champ-row"><span class="champ-pos ' + (chi === 0 ? 'c1' : chi === 1 ? 'c2' : 'c3') + '">' + (chi + 1) + '</span><span class="champ-info"><span class="champ-name">' + esc(c.driver) + '</span><span class="champ-team">' + esc(c.team) + '</span></span><span class="champ-meta"><span class="champ-pts">' + c.points + ' 分</span><span class="champ-wins">🏆 ' + c.wins + '胜</span></span></div>';
      }
    } else {
      html += '<div class="champ-loading" id="champLoading">加载赛季排名…</div>';
    }
    html += '</div>';
  }

  for (var c = 0; c < completedReversed.length; c++) {
    html += raceCardHTML(completedReversed[c], false);
  }
  html += '</div></div>';

  document.getElementById('calendarContent').innerHTML = html;
}

function loadChampion(y) {
  if (CHAMPIONS[y]) return;
  fetch('https://api.jolpi.ca/ergast/f1/' + y + '/driverStandings.json')
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(json) {
      var list = json.MRData.StandingsTable.StandingsLists[0].DriverStandings || [];
      var top3 = list.slice(0, 3).map(function(d) {
        return { driver: d.Driver.givenName + ' ' + d.Driver.familyName, team: d.Constructors[0].name, points: d.points, wins: d.wins };
      });
      CHAMPIONS[y] = top3;
      if (y === CALENDAR_YEAR) CURRENT_CHAMPION = top3;
      // Re-render if viewing this year
      if (CALENDAR_YEAR === y) renderCalendar();
    })
    .catch(function(err) { console.warn('Failed loading champion data for ' + y, err.message); });
}

function raceCardHTML(r, isNext) {
  var h = '';
  h += '<div class="r-card' + (isNext ? ' next-up' : '') + (r.done ? ' completed' : '') + '" data-round="' + r.r + '" style="animation-delay:' + (r.r * 0.02) + 's">';
  h += '<div class="r-top"><div class="r-flag">' + (r.flag || '🏁') + '</div><div class="r-info"><div class="r-name">' + esc(r.name) + '</div><div class="r-track">' + esc(r.en) + ' · ' + esc(r.track) + '</div></div></div>';
  h += '<div class="r-badges">';
  if (r.done) h += '<span class="r-badge done">✓ 已完成</span>';
  else if (isNext) h += '<span class="r-badge live">● 即将</span>';
  else h += '<span class="r-badge rnd">R' + r.r + '</span>';
  if (r.sprint) h += '<span class="r-badge sprint">⚡ 冲刺赛</span>';
  h += '</div>';
  h += '<div class="r-sched">';
  h += '<div class="sl race"><span class="sl-l">🏁 正赛</span><span class="sl-t">' + esc(r.displayDate) + '</span></div>';
  h += '<div class="sl quali"><span class="sl-l">⏱ 排位</span><span>' + esc(r.displayQuali) + '</span></div>';
  if (r.sprint) {
    h += '<div class="sl sprint"><span class="sl-l">⚡ 冲排</span><span>' + esc(r.displaySprintQ || '') + '</span></div>';
    h += '<div class="sl sprint"><span class="sl-l">🏃 冲刺</span><span>' + esc(r.displaySprintR || '') + '</span></div>';
  }
  h += '</div>';

  // Podium
  if (r.podium && r.podium.length >= 3) {
    h += '<div class="r-podium">';
    h += '<div class="pp"><span class="r-pm gold">1</span><span class="pp-name">' + esc(r.podium[0]) + '</span></div>';
    h += '<div class="pp"><span class="r-pm silver">2</span><span class="pp-name">' + esc(r.podium[1]) + '</span></div>';
    h += '<div class="pp"><span class="r-pm bronze">3</span><span class="pp-name">' + esc(r.podium[2]) + '</span></div>';
    h += '</div>';
  }

  h += '<div class="r-detail" id="detail-' + r.r + '"></div>';
  h += '<div class="r-toggle" onclick="event.stopPropagation();toggleDetail(this.parentElement)">展开详情 <span class="t-arrow">▾</span></div>';
  h += '</div>';
  return h;
}

var LOADING_RACES = {};

function toggleDetail(card) {
  var rnd = parseInt(card.getAttribute('data-round'), 10);
  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
    return;
  }
  card.classList.add('expanded');

  var detailEl = card.querySelector('.r-detail');
  if (!detailEl || detailEl.getAttribute('data-loaded')) return;

  // Already cached from earlier
  var key = CALENDAR_YEAR + '-' + rnd;
  if (RACE_DETAILS[key] && RACE_DETAILS[key].race) {
    fillDetail(detailEl, key);
    return;
  }

  if (LOADING_RACES[key]) return;
  LOADING_RACES[key] = true;
  detailEl.innerHTML = '<div class="d-loading"><div class="d-spinner"></div>加载赛事数据…</div>';

  Promise.all([
    fetch('https://api.jolpi.ca/ergast/f1/' + CALENDAR_YEAR + '/' + rnd + '/results.json').then(function(r) { if (!r.ok) throw new Error(); return r.json(); }).catch(function() { return null; }),
    fetch('https://api.jolpi.ca/ergast/f1/' + CALENDAR_YEAR + '/' + rnd + '/qualifying.json').then(function(r) { if (!r.ok) throw new Error(); return r.json(); }).catch(function() { return null; }),
    fetch('https://api.jolpi.ca/ergast/f1/' + CALENDAR_YEAR + '/' + rnd + '/sprint.json').then(function(r) { if (!r.ok) throw new Error(); return r.json(); }).catch(function() { return null; })
  ]).then(function(results) {
    var raceJson = results[0], qualiJson = results[1], sprintJson = results[2];
    RACE_DETAILS[key] = RACE_DETAILS[key] || {};
    if (raceJson) {
      var races = raceJson.MRData.RaceTable.Races || [];
      if (races.length) {
        var resList = races[0].Results || [];
        RACE_DETAILS[key].race = resList.slice(0, 10).map(function(entry) {
          return { driver: entry.Driver.givenName + ' ' + entry.Driver.familyName, pos: entry.position, time: entry.Time ? entry.Time.time : (entry.status || '') };
        });
        var fastest = null;
        for (var j = 0; j < resList.length; j++) {
          var fl = resList[j].FastestLap;
          if (fl && fl.rank === '1') { fastest = { driver: resList[j].Driver.givenName + ' ' + resList[j].Driver.familyName, time: fl.Time.time }; break; }
        }
        RACE_DETAILS[key].fastestLap = fastest;
      }
    }
    if (qualiJson) {
      var qRaces = qualiJson.MRData.RaceTable.Races || [];
      if (qRaces.length) {
        var qResults = qRaces[0].QualifyingResults || [];
        RACE_DETAILS[key].quali = qResults.slice(0, 10).map(function(q) {
          return { driver: q.Driver.givenName + ' ' + q.Driver.familyName, time: q.Q3 || q.Q2 || q.Q1 || '' };
        });
      }
    }
    if (sprintJson) {
      var sRaces = sprintJson.MRData.RaceTable.Races || [];
      if (sRaces.length) {
        var sResults = sRaces[0].SprintResults || [];
        RACE_DETAILS[key].sprint = sResults.slice(0, 8).map(function(s) {
          return { driver: s.Driver.givenName + ' ' + s.Driver.familyName, time: s.Time ? s.Time.time : (s.status || '') };
        });
      }
    }
    fillDetail(detailEl, key);
  }).catch(function() {
    detailEl.innerHTML = '<div class="d-block"><div class="d-info">数据加载失败</div></div>';
  }).finally(function() {
    delete LOADING_RACES[key];
  });
}

function fillDetail(el, key) {
  var dd = RACE_DETAILS[key];
  if (!dd) return;
  var html = '';

  // Race results (full top 10)
  if (dd.race && dd.race.length) {
    html += '<div class="d-block"><div class="d-title">🏁 正赛结果</div>';
    for (var i = 0; i < dd.race.length; i++) {
      var rc = dd.race[i];
      html += '<div class="d-row"><span class="d-pos">P' + rc.pos + '</span><span class="d-name">' + rc.driver + '</span><span class="d-time">' + (rc.time || '') + '</span></div>';
    }
    html += '</div>';
  }

  // Qualifying results (top 10)
  if (dd.quali && dd.quali.length) {
    html += '<div class="d-block"><div class="d-title">⏱ 排位赛结果</div>';
    for (var i = 0; i < Math.min(dd.quali.length, 10); i++) {
      var q = dd.quali[i];
      html += '<div class="d-row"><span class="d-pos">' + (i + 1) + '</span><span class="d-name">' + q.driver + '</span><span class="d-time">' + (q.time || '') + '</span></div>';
    }
    html += '</div>';
  }

  // Sprint results
  if (dd.sprint && dd.sprint.length) {
    html += '<div class="d-block"><div class="d-title">🏃 冲刺赛结果</div>';
    for (var i = 0; i < Math.min(dd.sprint.length, 8); i++) {
      var s = dd.sprint[i];
      html += '<div class="d-row"><span class="d-pos">' + (i + 1) + '</span><span class="d-name">' + s.driver + '</span><span class="d-time">' + (s.time || '') + '</span></div>';
    }
    html += '</div>';
  }

  // Fastest lap
  if (dd.fastestLap) {
    html += '<div class="d-block"><div class="d-title">⚡ 最快圈速</div>';
    html += '<div class="d-row"><span class="d-name">' + dd.fastestLap.driver + '</span><span class="d-time">' + dd.fastestLap.time + '</span></div></div>';
  }

  el.innerHTML = html;
  el.setAttribute('data-loaded', '1');
}

  html += '</div>';

      {team:'Mercedes',drivers:'Antonelli / Russell',points:219},{team:'Ferrari',drivers:'Leclerc / Hamilton',points:147},{team:'McLaren',drivers:'Norris / Piastri',points:106},{team:'Red Bull Racing',drivers:'Verstappen / Hadjar',points:57},{team:'Alpine',drivers:'Gasly / Colapinto',points:35},{team:'Racing Bulls',drivers:'Lawson / Lindblad',points:21},{team:'Haas',drivers:'Bearman / Ocon',points:19},{team:'Williams',drivers:'Sainz / Albon',points:7},{team:'Audi',drivers:'Bortoleto / Hülkenberg',points:2},{team:'Cadillac',drivers:'Pérez / Bottas',points:0},{team:'Aston Martin',drivers:'Alonso / Stroll',points:0}
    ]
  }};
}

// ===== MAIN =====
function loadAll() {
  setStatus('loading', '正在拉取最新数据…');

  var years = [2026, 2025, 2024, 2023, 2022];
  var yearFetches = [];
  for (var yi = 0; yi < years.length; yi++) {
    (function(y) {
      yearFetches.push(
        fetch('https://api.jolpi.ca/ergast/f1/' + y + '/races.json?limit=30')
          .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
          .then(function(json) {
            var races = json.MRData.RaceTable.Races || [];
            var now = new Date();
            CALENDARS[y] = races.map(function(r) {
              var raceDt = new Date(r.date + 'T' + (r.time || '00:00:00Z'));
              var hasSprint = !!(r.Sprint || r.SprintQualifying);
              return {
                r: parseInt(r.round, 10),
                flag: flagFor(r.Circuit.Location.country),
                name: cnFor(r.raceName),
                en: r.raceName,
                track: r.Circuit.circuitName,
                venue: r.Circuit.Location.locality,
                raceDate: r.date,
                raceTime: r.time,
                displayDate: fmtDate(r.date, r.time),
                displayQuali: r.Qualifying ? fmtQualiDate(r.Qualifying.date, r.Qualifying.time) : '',
                sprint: hasSprint,
                displaySprintQ: r.SprintQualifying ? fmtQualiDate(r.SprintQualifying.date, r.SprintQualifying.time) : '',
                displaySprintR: r.Sprint ? fmtQualiDate(r.Sprint.date, r.Sprint.time) : '',
                done: now > new Date(raceDt.getTime() + 86400000)
              };
            });
            // 2026 data ready — refresh UI immediately
            if (y === 2026) {
              CALENDAR_YEAR = 2026;
              renderCalendar();
              updateCountdown();
              setStatus('', '数据已更新');
            }
            // Fetch podiums for completed races in background (non-blocking)
            loadPodiumsInBackground(y);
          }).catch(function(err) { console.warn('Failed loading ' + y + ' calendar:', err.message); })
      );
    })(years[yi]);
  }

  var standingsPromise = Promise.all([
    fetch('https://api.jolpi.ca/ergast/f1/2026/driverStandings.json').then(function(r) { return r.json(); }),
    fetch('https://api.jolpi.ca/ergast/f1/2026/constructorStandings.json').then(function(r) { return r.json(); })
  ]).then(function(results) {
    var dList = results[0].MRData.StandingsTable.StandingsLists[0].DriverStandings || [];
    var drivers = dList.map(function(it) { return { driver: it.Driver.givenName + ' ' + it.Driver.familyName, team: it.Constructors[0].name, wins: parseInt(it.wins, 10) || 0, points: parseInt(it.points, 10) || 0 }; });
    var cList = results[1].MRData.StandingsTable.StandingsLists[0].ConstructorStandings || [];
    var constructors = cList.map(function(it) { return { team: it.Constructor.name, points: parseInt(it.points, 10) || 0, wins: parseInt(it.wins, 10) || 0, drivers: '' }; });
    var tbn = {};
    TEAMS.forEach(function(t) { tbn[t.name.replace(/[^a-zA-Z]/g, '').toLowerCase()] = t; });
    constructors.forEach(function(c) {
      var ck = c.team.replace(/[^a-zA-Z]/g, '').toLowerCase();
      if (tbn[ck]) { c.drivers = surname(tbn[ck].d1) + ' / ' + surname(tbn[ck].d2); c._cls = tbn[ck].cls; return; }
      for (var k in tbn) { if (k.indexOf(ck) !== -1 || ck.indexOf(k) !== -1) { c.drivers = surname(tbn[k].d1) + ' / ' + surname(tbn[k].d2); c._cls = tbn[k].cls; return; } }
      if (ck === 'rbf1team' && tbn['racingbulls']) { c.drivers = surname(tbn['racingbulls'].d1) + ' / ' + surname(tbn['racingbulls'].d2); c._cls = tbn['racingbulls'].cls; }
    });
    STANDINGS = { drivers: drivers, constructors: constructors };
    renderStandings();
    renderTeams();
  }).catch(function(err) { console.warn('Jolpica API 不可用：', err.message); });

  // Auto-refresh standings every 5 minutes
  setTimeout(function() { loadAll(); }, 300000);
}

function loadPodiumsInBackground(y) {
  var cal = CALENDARS[y];
  if (!cal) return;
  for (var ri = 0; ri < cal.length; ri++) {
    if (!cal[ri].done) continue;
    (function(race, idx) {
      var round = race.r;
      fetch('https://api.jolpi.ca/ergast/f1/' + y + '/' + round + '/results.json')
        .then(function(rr) { if (!rr.ok) throw new Error(); return rr.json(); })
        .then(function(rj) {
          var rcs = rj.MRData.RaceTable.Races || [];
          if (rcs.length) {
            var rsl = rcs[0].Results || [];
            var pod = [];
            for (var pi = 0; pi < Math.min(rsl.length, 3); pi++) {
              pod.push(rsl[pi].Driver.givenName + ' ' + rsl[pi].Driver.familyName);
            }
            if (CALENDARS[y][idx]) CALENDARS[y][idx].podium = pod;
          }
        }).catch(function() { /* silent */ });
    })(cal[ri], ri);
  }
}

function renderAll() { updateCountdown(); renderCalendar(); renderTeams(); renderStandings(); }

// ===== NEWS =====
var NEWS_CACHE_KEY = 'f1_news_cache';
var NEWS_CACHE_TS_KEY = 'f1_news_cache_ts';
var NEWS_TTL = 600000; // 10 minutes
var NEWS_RSS_URL = 'https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.motorsport.com%2Frss%2Ff1%2Fnews%2F';
var NEWS_LOADED = false;

function loadNews(force) {
  if (NEWS_LOADED && !force) return;
  NEWS_LOADED = true;

  renderNewsLoading();

  // Check cache
  var ts = localStorage.getItem(NEWS_CACHE_TS_KEY);
  if (ts && (Date.now() - parseInt(ts, 10)) < NEWS_TTL && !force) {
    var cached = localStorage.getItem(NEWS_CACHE_KEY);
    if (cached) {
      try { renderNews(JSON.parse(cached)); return; } catch(e) {}
    }
  }

  fetch(NEWS_RSS_URL)
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(json) {
      var items = (json.items || []).map(function(n) {
        return {
          title: n.title || '',
          link: n.link || '',
          desc: (n.description || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().substring(0, 200),
          date: n.pubDate || '',
          cat: (n.categories && n.categories.length) ? n.categories[0] : '',
          img: (n.enclosure && n.enclosure.link) ? n.enclosure.link : (n.thumbnail || '')
        };
      });
      localStorage.setItem(NEWS_CACHE_KEY, JSON.stringify(items));
      localStorage.setItem(NEWS_CACHE_TS_KEY, String(Date.now()));
      renderNews(items);
    })
    .catch(function(err) {
      console.warn('News fetch failed:', err);
      // Fallback to stale cache
      var cached = localStorage.getItem(NEWS_CACHE_KEY);
      if (cached) {
        try { renderNews(JSON.parse(cached)); return; } catch(e) {}
      }
      renderNewsError('新闻加载失败');
    });
}

function parseRSS(xml) {
  var items = [];
  // Parse RSS 2.0 XML
  var itemRegex = /<item>([\s\S]*?)<\/item>/gi;
  var itemMatch;
  while ((itemMatch = itemRegex.exec(xml)) !== null) {
    var itemXml = itemMatch[1];
    var title = extractTag(itemXml, 'title');
    var link = extractTag(itemXml, 'link');
    var desc = extractTag(itemXml, 'description');
    var pubDate = extractTag(itemXml, 'pubDate');
    var cat = extractTag(itemXml, 'category');
    var enclosure = extractAttr(itemXml, 'enclosure', 'url');

    if (!title) continue;

    // Strip HTML from description
    var plainDesc = (desc || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    // Truncate
    if (plainDesc.length > 200) plainDesc = plainDesc.substring(0, 200) + '…';

    items.push({
      title: title,
      link: link || '',
      desc: plainDesc,
      date: pubDate || '',
      cat: cat || '',
      img: enclosure || ''
    });
  }
  return items.slice(0, 20);
}

function extractTag(xml, tag) {
  var re = new RegExp('<'+tag+'[^>]*><!\\[CDATA\\[([\\s\\S]*?)\\]\\]></'+tag+'>', 'i');
  var m = xml.match(re);
  if (m) return m[1].trim();
  var re2 = new RegExp('<'+tag+'[^>]*>([\\s\\S]*?)</'+tag+'>', 'i');
  var m2 = xml.match(re2);
  return m2 ? m2[1].trim() : '';
}

function extractAttr(xml, tag, attr) {
  var re = new RegExp('<'+tag+'[^>]*'+attr+'="([^"]*)"', 'i');
  var m = xml.match(re);
  return m ? m[1] : '';
}

function renderNewsLoading() {
  document.getElementById('newsContent').innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>正在加载最新新闻…</p></div>';
}
function renderNewsError(msg) {
  document.getElementById('newsContent').innerHTML = '<div class="loading-spinner"><p style="color:var(--f1-muted);">' + esc(msg || '新闻加载失败') + '</p><button onclick="refreshNews()" style="margin-top:8px;padding:6px 16px;background:none;border:1px solid var(--f1-border);color:var(--f1-muted);border-radius:16px;cursor:pointer;font-size:0.55rem;">重试</button></div>';
}

function formatNewsDate(d) {
  if (!d) return '';
  try {
    var dt = new Date(d);
    var now = new Date();
    var diff = now - dt;
    if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
    if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';
    return dt.toLocaleDateString('zh-CN', {month:'short', day:'numeric'});
  } catch(e) { return d; }
}

function renderNews(items) {
  var html = '';
  html += '<h2>F1 最新新闻</h2>';
  html += '<div class="news-refresh"><span class="dot"></span><span>' + formatNewsDate(new Date().toISOString()) + ' 更新</span><button onclick="refreshNews()">刷新</button></div>';

  if (!items || !items.length) {
    html += '<p style="text-align:center;color:var(--f1-muted);padding:40px;">暂无新闻</p>';
    document.getElementById('newsContent').innerHTML = html;
    return;
  }

  html += '<div class="news-grid">';
  for (var i = 0; i < items.length; i++) {
    var n = items[i];
    html += '<div class="n-card" style="animation-delay:' + (i * 0.03) + 's; animation:cardPop 0.4s ease backwards;">';
    if (n.img) {
      html += '<img class="n-img" src="' + esc(n.img) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
    }
    html += '<div class="n-body">';
    html += '<div class="n-title"><a href="' + esc(n.link) + '" target="_blank" rel="noopener">' + esc(n.title) + '</a></div>';
    if (n.desc) html += '<div class="n-desc">' + esc(n.desc) + '</div>';
    html += '<div class="n-meta">';
    html += '<span class="n-date">' + esc(formatNewsDate(n.date)) + '</span>';
    if (n.cat) html += '<span class="n-cat">' + esc(n.cat) + '</span>';
    html += '</div></div></div>';
  }
  html += '</div>';
  html += '<p class="n-source" style="text-align:center;margin-top:8px;">来源：Motorsport.com</p>';
  document.getElementById('newsContent').innerHTML = html;
}

function refreshNews() {
  NEWS_LOADED = false;
  loadNews(true);
}

document.querySelectorAll('nav button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
    this.classList.add('active');
    document.getElementById(this.dataset.tab).classList.add('active');
  });
});
