<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🏎️ F1 2026 实时积分</title>
<style>
  :root {
    --f1-red: #E10600;
    --f1-dark: #15151E;
    --f1-card: #1E1E2A;
    --f1-border: #2A2A3A;
    --f1-text: #E0E0E0;
    --f1-muted: #8888A0;
    --gold: #FFD700;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0D0D14;
    color: var(--f1-text);
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, var(--f1-red) 0%, #8B0000 50%, var(--f1-dark) 100%);
    padding: clamp(28px, 5vw, 50px) 16px clamp(20px, 4vw, 36px);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: repeating-linear-gradient(90deg, var(--f1-red) 0px, var(--f1-red) 40px, #fff 40px, #fff 80px);
  }
  .hero h1 {
    font-size: clamp(1.6rem, 5vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .hero .sub {
    margin-top: 6px;
    font-size: clamp(0.8rem, 2vw, 1rem);
    opacity: 0.9;
  }
  .hero .refresh-badge {
    display: inline-block;
    margin-top: 10px;
    padding: 4px 14px;
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    font-size: 0.75rem;
    opacity: 0.8;
  }
  .refresh-badge .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    background: #4CAF50;
  }
  .refresh-badge .dot.stale { background: #FF9800; }
  .refresh-badge .dot.loading { background: #FFC107; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Nav tabs */
  nav {
    background: var(--f1-dark);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--f1-red);
  }
  nav .tabs {
    display: flex;
    max-width: 900px;
    margin: 0 auto;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  nav .tabs::-webkit-scrollbar { display: none; }
  nav button {
    flex: 1;
    min-width: fit-content;
    padding: 12px 14px;
    background: none; border: none;
    color: var(--f1-muted);
    font-size: clamp(0.78rem, 2vw, 0.9rem);
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  nav button:active { background: rgba(255,255,255,0.05); }
  nav button.active { color: #fff; border-bottom-color: var(--f1-red); }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: clamp(16px, 3vw, 28px) 12px;
  }

  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  h2 {
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    margin-bottom: 14px;
    padding-left: 10px;
    border-left: 4px solid var(--f1-red);
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--f1-card);
    border: 1px solid var(--f1-border);
    border-radius: 10px;
    padding: clamp(12px, 2vw, 18px);
    text-align: center;
  }
  .stat-card .label {
    font-size: 0.7rem;
    color: var(--f1-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stat-card .value {
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    font-weight: 800;
    margin-top: 2px;
  }

  /* Tables */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 10px;
    border: 1px solid var(--f1-border);
    margin-bottom: 20px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--f1-card);
    font-size: clamp(0.72rem, 1.8vw, 0.88rem);
  }
  th {
    background: #252535;
    color: var(--f1-muted);
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 10px 12px;
    text-align: left;
    white-space: nowrap;
  }
  td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--f1-border);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:active td { background: rgba(225,6,0,0.08); }
  .pos-1 { color: var(--gold); font-weight: 700; }
  .pos-2 { color: var(--silver); font-weight: 700; }
  .pos-3 { color: var(--bronze); font-weight: 700; }

  .team-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.73rem;
    font-weight: 600;
  }
  .team-mercedes { background: #00D2BE; color: #000; }
  .team-ferrari { background: #DC0000; color: #fff; }
  .team-mclaren { background: #FF8700; color: #000; }
  .team-redbull { background: #3671C6; color: #fff; }
  .team-alpine { background: #0093CC; color: #fff; }
  .team-haas { background: #B6BABD; color: #000; }
  .team-racingbulls { background: #6692FF; color: #fff; }
  .team-williams { background: #005AFF; color: #fff; }
  .team-audi { background: #4CAF50; color: #000; }
  .team-cadillac { background: #1A1A2E; color: #E0C068; border: 1px solid #E0C068; }
  .team-astonmartin { background: #006F62; color: #fff; }

  /* Calendar */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .race-card {
    background: var(--f1-card);
    border: 1px solid var(--f1-border);
    border-radius: 10px;
    padding: 12px;
    transition: border-color 0.2s;
  }
  .race-card:active { border-color: var(--f1-red); }
  .race-card .round {
    font-size: 0.65rem;
    color: var(--f1-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .race-card .flag { font-size: 1.3rem; margin: 3px 0; }
  .race-card .name { font-weight: 700; font-size: 0.8rem; line-height: 1.2; }
  .race-card .date { font-size: 0.7rem; color: var(--f1-muted); margin-top: 3px; }
  .race-card .badge {
    display: inline-block;
    background: var(--f1-red); color: #fff;
    font-size: 0.62rem; padding: 1px 6px;
    border-radius: 3px; margin-top: 5px; font-weight: 700;
  }
  .race-card.completed { opacity: 0.55; }
  .race-card.upcoming { border-left: 3px solid var(--f1-red); }

  /* Tech cards */
  .tech-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 12px;
  }
  .tech-card {
    background: var(--f1-card);
    border: 1px solid var(--f1-border);
    border-radius: 10px;
    padding: clamp(12px, 2vw, 18px);
  }
  .tech-card h3 {
    font-size: clamp(0.85rem, 2vw, 0.95rem);
    margin-bottom: 10px;
    color: var(--f1-red);
  }
  .tech-card .spec {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid var(--f1-border);
    font-size: clamp(0.72rem, 1.8vw, 0.82rem);
    gap: 12px;
  }
  .tech-card .spec:last-child { border-bottom: none; }
  .tech-card .spec-label { color: var(--f1-muted); flex-shrink: 0; }

  .loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--f1-muted);
  }
  .loading-spinner .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--f1-border);
    border-top-color: var(--f1-red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #3D0E0E;
    border: 1px solid #8B0000;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: #FFAAAA;
  }

  .footer {
    text-align: center;
    padding: 20px;
    color: var(--f1-muted);
    font-size: 0.72rem;
    border-top: 1px solid var(--f1-border);
    margin-top: 20px;
  }

  .btn-retry {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 16px;
    background: var(--f1-red);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<header class="hero">
  <h1>🏎️ F1 2026</h1>
  <div class="sub">实时积分 · 赛程 · 车队 · 技术规格</div>
  <div class="refresh-badge" id="refreshBadge">
    <span class="dot" id="refreshDot"></span>
    <span id="refreshLabel">加载中…</span>
  </div>
</header>

<nav>
  <div class="tabs">
    <button class="active" data-tab="standings">积分榜</button>
    <button data-tab="calendar">赛程</button>
    <button data-tab="teams">车队</button>
    <button data-tab="tech">技术</button>
  </div>
</nav>

<main class="container">
  <section id="standings" class="section active">
    <div id="standingsContent"><div class="loading-spinner"><div class="spinner"></div><p>正在加载最新数据…</p></div></div>
  </section>
  <section id="calendar" class="section"></section>
  <section id="teams" class="section"></section>
  <section id="tech" class="section"></section>
</main>

<footer class="footer">
  打开页面时自动拉取最新积分 · 数据缓存 1 小时
</footer>

<script>
// ===== DATA =====

const CALENDAR = [
  {r:1,flag:'🇦🇺',name:'Australian GP',date:'3月6-8日',venue:'墨尔本',done:true},
  {r:2,flag:'🇨🇳',name:'Chinese GP',date:'3月13-15日',venue:'上海',done:true,sprint:true},
  {r:3,flag:'🇯🇵',name:'Japanese GP',date:'3月27-29日',venue:'铃鹿',done:true},
  {r:4,flag:'🇧🇭',name:'Bahrain GP',date:'4月10-12日',venue:'萨基尔',done:true},
  {r:5,flag:'🇸🇦',name:'Saudi Arabian GP',date:'4月17-19日',venue:'吉达',done:true},
  {r:6,flag:'🇺🇸',name:'Miami GP',date:'5月1-3日',venue:'迈阿密',done:true,sprint:true},
  {r:7,flag:'🇨🇦',name:'Canadian GP',date:'5月22-24日',venue:'蒙特利尔',done:true,sprint:true},
  {r:8,flag:'🇲🇨',name:'Monaco GP',date:'6月5-7日',venue:'摩纳哥'},
  {r:9,flag:'🇪🇸',name:'Spanish GP',date:'6月12-14日',venue:'巴塞罗那'},
  {r:10,flag:'🇦🇹',name:'Austrian GP',date:'6月26-28日',venue:'斯皮尔伯格'},
  {r:11,flag:'🇬🇧',name:'British GP',date:'7月3-5日',venue:'银石',sprint:true},
  {r:12,flag:'🇧🇪',name:'Belgian GP',date:'7月17-19日',venue:'斯帕'},
  {r:13,flag:'🇭🇺',name:'Hungarian GP',date:'7月24-26日',venue:'布达佩斯'},
  {r:14,flag:'🇳🇱',name:'Dutch GP',date:'8月21-23日',venue:'赞德沃特',sprint:true},
  {r:15,flag:'🇮🇹',name:'Italian GP',date:'9月4-6日',venue:'蒙扎'},
  {r:16,flag:'🇪🇸',name:'Madrid GP 🆕',date:'9月11-13日',venue:'马德里'},
  {r:17,flag:'🇦🇿',name:'Azerbaijan GP',date:'9月25-27日',venue:'巴库'},
  {r:18,flag:'🇸🇬',name:'Singapore GP',date:'10月9-11日',venue:'新加坡',sprint:true},
  {r:19,flag:'🇺🇸',name:'United States GP',date:'10月23-25日',venue:'奥斯汀'},
  {r:20,flag:'🇲🇽',name:'Mexico City GP',date:'10月30日-11月1日',venue:'墨西哥城'},
  {r:21,flag:'🇧🇷',name:'São Paulo GP',date:'11月6-8日',venue:'圣保罗'},
  {r:22,flag:'🇺🇸',name:'Las Vegas GP',date:'11月19-21日',venue:'拉斯维加斯'},
  {r:23,flag:'🇶🇦',name:'Qatar GP',date:'11月27-29日',venue:'卢赛尔'},
  {r:24,flag:'🇦🇪',name:'Abu Dhabi GP',date:'12月4-6日',venue:'亚斯码头'},
];

const TEAMS = [
  {name:'Mercedes',pu:'Mercedes',d1:'George Russell',d1n:63,d2:'Andrea Kimi Antonelli',d2n:12,cls:'team-mercedes'},
  {name:'Ferrari',pu:'Ferrari',d1:'Charles Leclerc',d1n:16,d2:'Lewis Hamilton',d2n:44,cls:'team-ferrari'},
  {name:'McLaren',pu:'Mercedes',d1:'Lando Norris',d1n:1,d2:'Oscar Piastri',d2n:81,cls:'team-mclaren'},
  {name:'Red Bull Racing',pu:'Honda',d1:'Max Verstappen',d1n:3,d2:'Isack Hadjar',d2n:6,cls:'team-redbull'},
  {name:'Aston Martin',pu:'Honda',d1:'Fernando Alonso',d1n:14,d2:'Lance Stroll',d2n:18,cls:'team-astonmartin'},
  {name:'Alpine',pu:'Renault',d1:'Pierre Gasly',d1n:10,d2:'Franco Colapinto',d2n:43,cls:'team-alpine'},
  {name:'Haas',pu:'Ferrari',d1:'Esteban Ocon',d1n:31,d2:'Oliver Bearman',d2n:87,cls:'team-haas'},
  {name:'Racing Bulls',pu:'Honda',d1:'Liam Lawson',d1n:30,d2:'Arvid Lindblad 🆕',d2n:41,cls:'team-racingbulls'},
  {name:'Williams',pu:'Mercedes',d1:'Alex Albon',d1n:23,d2:'Carlos Sainz',d2n:55,cls:'team-williams'},
  {name:'Audi 🆕',pu:'Ferrari',d1:'Nico Hülkenberg',d1n:27,d2:'Gabriel Bortoleto',d2n:5,cls:'team-audi'},
  {name:'Cadillac 🆕',pu:'Ferrari',d1:'Sergio Pérez',d1n:11,d2:'Valtteri Bottas',d2n:77,cls:'team-cadillac'},
];

// ===== HELPERS =====

const CACHE_KEY = 'f1_2026_cache';
const CACHE_TTL = 60 * 60 * 1000; // 1 hour

function setStatus(state, text) {
  var dot = document.getElementById('refreshDot');
  dot.className = 'dot';
  if (state === 'loading') dot.classList.add('loading');
  else if (state === 'stale') dot.classList.add('stale');
  document.getElementById('refreshLabel').textContent = text;
}

function getCache() {
  try {
    var raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    var cache = JSON.parse(raw);
    if (Date.now() - cache.ts > CACHE_TTL) return null;
    return cache.data;
  } catch(e) { return null; }
}

function setCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data }));
  } catch(e) {}
}

// ===== RENDER =====

var teamMap = {};
TEAMS.forEach(function(t) { teamMap[t.name.toLowerCase().replace(/[^a-z]/g,'')] = t; });

function getTeamCls(teamName) {
  if (!teamName) return '';
  var key = teamName.toLowerCase().replace(/[^a-z]/g,'');
  var t = teamMap[key];
  return t ? t.cls : '';
}

function renderStandings(data) {
  var drivers = data.drivers || [];
  var constructors = data.constructors || [];
  var leader = drivers[0] || {};
  var wins = leader.wins || 0;
  var completedRaces = 7;
  var totalRaces = 24;

  var num1 = posClass(1), num2 = posClass(2), num3 = posClass(3);

  var html = '';
  html += '<div class="stats-row">';
  html += '<div class="stat-card"><div class="label">领跑者</div><div class="value">' + esc(leader.driver || '—') + '</div></div>';
  html += '<div class="stat-card"><div class="label">积分</div><div class="value">' + (leader.points || '—') + '</div></div>';
  html += '<div class="stat-card"><div class="label">分站冠军</div><div class="value">' + wins + '</div></div>';
  html += '<div class="stat-card"><div class="label">剩余分站</div><div class="value">' + (totalRaces - completedRaces) + '</div></div>';
  html += '</div>';

  html += '<h2>车手积分榜</h2><div class="table-wrap"><table>';
  html += '<thead><tr><th>#</th><th>车手</th><th>国籍</th><th>车队</th><th>冠军</th><th>积分</th></tr></thead><tbody>';
  for (var i = 0; i < drivers.length; i++) {
    var d = drivers[i];
    var pcls = i < 3 ? ' pos-' + (i + 1) : '';
    html += '<tr><td class="' + pcls + '">' + (i + 1) + '</td>';
    html += '<td><strong>' + esc(d.driver) + '</strong></td>';
    html += '<td>' + esc(d.nat || '') + '</td>';
    html += '<td><span class="team-tag ' + getTeamCls(d.team) + '">' + esc(d.team) + '</span></td>';
    html += '<td>' + (d.wins || 0) + '</td>';
    html += '<td><strong>' + esc(d.points) + '</strong></td></tr>';
  }
  html += '</tbody></table></div>';

  html += '<h2>车队积分榜</h2><div class="table-wrap"><table>';
  html += '<thead><tr><th>#</th><th>车队</th><th>车手</th><th>积分</th></tr></thead><tbody>';
  for (var j = 0; j < constructors.length; j++) {
    var c = constructors[j];
    var pc = j < 3 ? ' pos-' + (j + 1) : '';
    html += '<tr><td class="' + pc + '">' + (j + 1) + '</td>';
    html += '<td><strong>' + esc(c.team) + '</strong></td>';
    html += '<td>' + esc(c.drivers || '') + '</td>';
    html += '<td><strong>' + esc(c.points) + '</strong></td></tr>';
  }
  html += '</tbody></table></div>';

  html += '<p style="font-size:0.72rem;color:var(--f1-muted);text-align:center;margin-top:8px;">数据更新至 2026年5月24日 加拿大站 · 本页生成于 ' + new Date().toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}) + '</p>';

  document.getElementById('standingsContent').innerHTML = html;
}

function posClass(i) { return i === 1 ? 'pos-1' : i === 2 ? 'pos-2' : i === 3 ? 'pos-3' : ''; }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCalendar() {
  var html = '<h2>2026 赛历 · 24 场分站</h2><div class="calendar-grid">';
  for (var i = 0; i < CALENDAR.length; i++) {
    var r = CALENDAR[i];
    var cls = r.done ? ' completed' : ' upcoming';
    html += '<div class="race-card' + cls + '">';
    html += '<div class="round">R' + r.r + (r.done ? ' · 已完成' : '') + '</div>';
    html += '<div class="flag">' + r.flag + '</div>';
    html += '<div class="name">' + r.name + '</div>';
    html += '<div class="date">' + r.date + ' · ' + r.venue + '</div>';
    if (r.sprint) html += '<div class="badge">🏃 冲刺赛</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('calendar').innerHTML = html;
}

function renderTeams() {
  var html = '<h2>车队与车手阵容</h2><div class="table-wrap"><table>';
  html += '<thead><tr><th>车队</th><th>动力单元</th><th>车手 1</th><th>车手 2</th></tr></thead><tbody>';
  for (var i = 0; i < TEAMS.length; i++) {
    var t = TEAMS[i];
    html += '<tr>';
    html += '<td><strong>' + t.name + '</strong></td>';
    html += '<td>' + t.pu + '</td>';
    html += '<td>' + t.d1 + ' (#' + t.d1n + ')</td>';
    html += '<td>' + t.d2 + ' (#' + t.d2n + ')</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  html += '<h2>阵容亮点</h2><div class="tech-grid">';
  html += '<div class="tech-card"><h3>🆕 唯一新秀</h3><p style="font-size:0.85rem;">18 岁的 Arvid Lindblad (Racing Bulls) 是从 F2 直接晋升的唯一新秀车手。</p></div>';
  html += '<div class="tech-card"><h3>🏁 全新车队</h3><p style="font-size:0.85rem;">Cadillac 作为第 11 支车队加入 F1，由 Pérez 和 Bottas 搭档。Audi 正式以厂队身份接管 Sauber。</p></div>';
  html += '<div class="tech-card"><h3>🔄 红牛重组</h3><p style="font-size:0.85rem;">Isack Hadjar 晋升红牛正队；角田裕毅降为储备车手。Adrian Newey 出任 Aston Martin 领队。</p></div>';
  html += '<div class="tech-card"><h3>👑 新王登基</h3><p style="font-size:0.85rem;">19 岁的 Andrea Kimi Antonelli 在新秀赛季斩获 4 场分站冠军，以 43 分优势领跑积分榜。</p></div>';
  html += '</div>';
