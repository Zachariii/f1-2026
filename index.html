<title>F1 2026 · 实时积分</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --f1-red: #E10600;
  --f1-deep: #0A0A12;
  --f1-card: #151523;
  --f1-card-hover: #1A1A2D;
  --f1-border: #232337;
  --f1-text: #EAEAEE;
  --f1-muted: #72728A;
  --gold: #FFD700; --silver: #C8C8D0; --bronze: #CD7F32;
  --accent-green: #00E676;
  --accent-orange: #FF9100;
  --font-display: 'Orbitron', monospace;
  --font-body: 'Noto Sans SC', -apple-system, system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--f1-deep); color: var(--f1-text);
  font-family: var(--font-body); line-height:1.6; min-height:100vh;
  -webkit-text-size-adjust:100%;
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(225,6,0,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(225,6,0,0.04) 0%, transparent 50%);
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.008) 40px, rgba(255,255,255,0.008) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.008) 40px, rgba(255,255,255,0.008) 41px);
}

/* Hero */
.hero {
  position:relative; overflow:hidden;
  background: linear-gradient(135deg, #0D0A12 0%, #1A0A0E 45%, var(--f1-red) 100%);
  padding: clamp(28px, 5vw, 48px) 16px clamp(20px, 4vw, 32px); text-align:center;
}
.hero::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 25% 15%, rgba(225,6,0,0.2) 0%, transparent 55%), radial-gradient(ellipse at 75% 60%, rgba(225,6,0,0.08) 0%, transparent 40%); }
.hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background: repeating-linear-gradient(90deg, var(--f1-red) 0px, var(--f1-red) 24px, #fff 24px, #fff 48px, var(--accent-green) 48px, var(--accent-green) 72px, #fff 72px, #fff 96px); }
.hero h1 { font-family:var(--font-display); font-size:clamp(1.6rem,5vw,2.4rem); font-weight:900; letter-spacing:-0.5px; position:relative; text-shadow:0 0 30px rgba(225,6,0,0.4),0 0 60px rgba(225,6,0,0.2); margin-bottom:2px; }
.hero .sub { position:relative; font-size:clamp(0.78rem,2vw,0.9rem); opacity:0.85; font-weight:500; }
.hero .refresh-badge { display:inline-flex; align-items:center; gap:6px; margin-top:10px; padding:4px 14px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08); border-radius:24px; font-size:0.66rem; opacity:0.9; position:relative; backdrop-filter:blur(8px); }
.refresh-badge .dot { width:6px; height:6px; border-radius:50%; background:var(--accent-green); box-shadow:0 0 6px var(--accent-green); }
.refresh-badge .dot.stale { background:#FF9800; box-shadow:0 0 6px #FF9800; }
.refresh-badge .dot.loading { background:#FFC107; box-shadow:0 0 6px #FFC107; animation:pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Nav */
nav { background:rgba(17,17,28,0.9); position:sticky; top:0; z-index:100; backdrop-filter:blur(12px); border-bottom:1px solid rgba(225,6,0,0.2); }
nav .tabs { display:flex; max-width:900px; margin:0 auto; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
nav .tabs::-webkit-scrollbar { display:none; }
nav button { flex:1; min-width:fit-content; padding:13px 20px; background:none; border:none; color:var(--f1-muted); font-family:var(--font-body); font-size:0.82rem; font-weight:700; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:all 0.25s; -webkit-tap-highlight-color:transparent; }
nav button:active { background:rgba(255,255,255,0.03); }
nav button.active { color:#fff; border-bottom-color:var(--f1-red); }

.container { max-width:900px; margin:0 auto; padding:clamp(20px,3vw,30px) 14px; position:relative; z-index:1; }
.section { display:none; }
.section.active { display:block; animation:sectionIn 0.4s ease; }
@keyframes sectionIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

h2 { font-family:var(--font-display); font-size:clamp(0.88rem,2.5vw,1.05rem); font-weight:700; margin-bottom:16px; padding-left:12px; border-left:4px solid var(--f1-red); letter-spacing:0.3px; text-transform:uppercase; }

/* Stats row */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:24px; }
@media(max-width:480px){ .stats-row { grid-template-columns:repeat(2,1fr); } }
.stat-card { background:var(--f1-card); border:1px solid var(--f1-border); border-radius:10px; padding:12px 8px; text-align:center; transition:border-color 0.25s,transform 0.15s; position:relative; overflow:hidden; animation:cardPop 0.5s ease backwards; }
.stat-card:nth-child(1){ animation-delay:0.05s; } .stat-card:nth-child(2){ animation-delay:0.1s; } .stat-card:nth-child(3){ animation-delay:0.15s; } .stat-card:nth-child(4){ animation-delay:0.2s; }
@keyframes cardPop { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
.stat-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent 0%,var(--f1-red) 50%,transparent 100%); opacity:0.3; }
.stat-card .label { font-family:var(--font-display); font-size:0.54rem; color:var(--f1-muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:3px; }
.stat-card .value { font-family:var(--font-display); font-size:clamp(0.9rem,2vw,1.3rem); font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.stat-card .sub-value { font-size:0.56rem; color:var(--f1-muted); margin-top:2px; }

/* Standings */
.standings-list { display:flex; flex-direction:column; gap:3px; margin-bottom:22px; }
.s-row { display:flex; align-items:center; gap:8px; background:var(--f1-card); border:1px solid transparent; border-left:3px solid var(--f1-border); border-radius:8px; padding:9px 10px; transition:all 0.2s; min-width:0; animation:slideUp 0.35s ease backwards; }
@keyframes slideUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.s-row:active { background:var(--f1-card-hover); border-left-color:var(--f1-red); }
.s-row.s-podium { border-left-color:rgba(225,6,0,0.3); }
.s-row .s-pos-w { width:28px; min-width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:700; font-size:0.75rem; flex-shrink:0; background:rgba(255,255,255,0.03); color:var(--f1-muted); }
.s-row .s-pos-w.p1 { background:rgba(255,215,0,0.12); color:var(--gold); }
.s-row .s-pos-w.p2 { background:rgba(200,200,208,0.1); color:var(--silver); }
.s-row .s-pos-w.p3 { background:rgba(205,127,50,0.12); color:var(--bronze); }
.s-row .s-info { flex:1; min-width:0; }
.s-row .s-name { font-weight:700; font-size:0.78rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.s-row .s-sub { font-size:0.58rem; color:var(--f1-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.s-row .s-meta { display:flex; align-items:center; gap:10px; flex-shrink:0; font-size:0.58rem; color:var(--f1-muted); }
.s-row .s-pts { font-family:var(--font-display); font-weight:700; font-size:0.9rem; min-width:36px; text-align:right; color:var(--f1-text); }

.team-tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:0.62rem; font-weight:700; letter-spacing:0.2px; }
.team-mercedes{background:#00D2BE;color:#000}.team-ferrari{background:#DC0000;color:#fff}.team-mclaren{background:#FF8700;color:#000}.team-redbull{background:#3671C6;color:#fff}.team-alpine{background:#0093CC;color:#fff}.team-haas{background:#B6BABD;color:#000}.team-racingbulls{background:#6692FF;color:#fff}.team-williams{background:#005AFF;color:#fff}.team-audi{background:#4CAF50;color:#000}.team-cadillac{background:#1A1A2E;color:#E0C068;border:1px solid #E0C068}.team-astonmartin{background:#006F62;color:#fff}

/* Team cards */
.team-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:8px; margin-bottom:26px; }
@media(max-width:600px){ .team-grid{grid-template-columns:1fr;} }
.t-card { background:var(--f1-card); border:1px solid var(--f1-border); border-radius:10px; padding:14px; display:flex; flex-direction:column; gap:12px; transition:border-color 0.2s; }
.t-card:active { border-color:var(--f1-red); }
.t-card .t-header { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.t-card .t-drivers { display:flex; gap:8px; }
.t-card .t-drv { flex:1; background:rgba(0,0,0,0.18); border-radius:8px; padding:10px; text-align:center; min-width:0; }
.t-card .t-drv-name { font-weight:700; font-size:0.76rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.t-card .t-drv-num { font-size:0.58rem; color:var(--f1-muted); margin-top:2px; }

/* Calendar */
.calendar-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
@media(max-width:600px){ .calendar-grid{grid-template-columns:1fr;} }
.r-card { background:var(--f1-card); border:1px solid var(--f1-border); border-radius:10px; padding:12px; display:flex; flex-direction:column; gap:8px; transition:all 0.2s; animation:cardPop 0.4s ease backwards; cursor:default; }
.r-card:active { border-color:var(--f1-red); transform:scale(0.985); }
.r-card .r-top { display:flex; align-items:flex-start; gap:8px; }
.r-card .r-flag { font-size:1.3rem; flex-shrink:0; line-height:1; }
.r-card .r-info { flex:1; min-width:0; }
.r-card .r-info .r-name { font-weight:700; font-size:0.78rem; line-height:1.2; }
.r-card .r-info .r-track { font-size:0.56rem; color:var(--f1-muted); margin-top:2px; }
.r-card .r-badges { display:flex; flex-wrap:wrap; gap:4px; }
.r-badge { display:inline-block; padding:2px 6px; border-radius:3px; font-family:var(--font-display); font-size:0.5rem; font-weight:700; letter-spacing:0.4px; line-height:1.4; }
.r-badge.rnd{background:rgba(255,255,255,0.05);color:var(--f1-muted)}.r-badge.done{background:rgba(0,230,118,0.08);color:var(--accent-green)}.r-badge.sprint{background:rgba(255,145,0,0.1);color:var(--accent-orange)}
.r-card .r-sched { display:flex; flex-direction:column; gap:3px; padding:7px 10px; background:rgba(0,0,0,0.18); border-radius:6px; }
.r-card .r-sched .sl { display:flex; align-items:center; gap:6px; font-size:0.56rem; }
.r-card .r-sched .sl .sl-l { flex-shrink:0; font-weight:700; width:44px; }
.r-card .r-sched .sl.race .sl-l { color:var(--f1-red); }
.r-card .r-sched .sl.race .sl-t { color:var(--f1-red); font-weight:700; }
.r-card .r-sched .sl.quali { color:var(--f1-muted); }
.r-card .r-sched .sl.sprint { color:var(--accent-orange); }

/* Expand toggle */
.r-card .r-toggle { display:flex; align-items:center; justify-content:center; gap:4px; padding:4px 0 0; font-size:0.55rem; color:var(--f1-muted); cursor:pointer; font-family:var(--font-display); letter-spacing:1px; text-transform:uppercase; transition:color 0.2s; }
.r-card .r-toggle:hover { color:var(--f1-text); }
.r-card .r-toggle .t-arrow { display:inline-block; transition:transform 0.2s; font-size:0.5rem; }
.r-card.expanded .r-toggle .t-arrow { transform:rotate(180deg); }

/* Race detail panel */
.r-detail { display:none; flex-direction:column; gap:6px; }
.r-card.expanded .r-detail { display:flex; animation:fadeSlide 0.3s ease; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.r-detail .d-block { padding:7px 10px; background:rgba(0,0,0,0.12); border-radius:6px; }
.r-detail .d-title { font-family:var(--font-display); font-size:0.5rem; color:var(--f1-muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:4px; }
.r-detail .d-row { display:flex; align-items:center; gap:5px; font-size:0.55rem; padding:2px 0; }
.r-detail .d-row .d-pos { width:18px; text-align:center; font-weight:700; color:var(--f1-muted); flex-shrink:0; }
.r-detail .d-row .d-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.r-detail .d-row .d-time { font-family:var(--font-display); font-size:0.5rem; color:var(--f1-muted); flex-shrink:0; }
.r-detail .d-info { font-size:0.55rem; color:var(--f1-muted); line-height:1.6; }

.r-card.completed { opacity:0.5; }
.r-card.completed .r-detail { opacity:1; }
.r-card.next-up { border-color:rgba(225,6,0,0.35); box-shadow:0 0 20px rgba(225,6,0,0.05); }

.r-podium { display:flex; flex-direction:column; gap:2px; padding:7px 10px; background:rgba(0,0,0,0.12); border-radius:6px; }
.r-podium .pp { display:flex; align-items:center; gap:5px; font-size:0.55rem; overflow:hidden; white-space:nowrap; }
.r-podium .pp-name { overflow:hidden; text-overflow:ellipsis; }
.r-pm { width:14px; height:14px; min-width:14px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.45rem; font-weight:900; line-height:1; }
.r-pm.gold{background:var(--gold);color:#000}.r-pm.silver{background:var(--silver);color:#000}.r-pm.bronze{background:var(--bronze);color:#fff}

.section-label { font-family:var(--font-display); font-size:0.6rem; font-weight:700; margin:18px 0 6px; text-transform:uppercase; letter-spacing:2px; }
.section-label.up{color:var(--f1-red)}.section-label.past{color:var(--f1-muted)}

.footer { text-align:center; padding:20px; color:var(--f1-muted); font-size:0.6rem; border-top:1px solid var(--f1-border); margin-top:20px; position:relative; z-index:1; }
.loading-spinner { text-align:center; padding:40px; color:var(--f1-muted); }
.loading-spinner .spinner { width:28px; height:28px; border:2px solid var(--f1-border); border-top-color:var(--f1-red); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }
/* Calendar sub-tabs */
.cal-tabs { display:flex; gap:0; margin-bottom:14px; border:1px solid var(--f1-border); border-radius:8px; overflow:hidden; }
.cal-tab { flex:1; padding:7px 0; background:rgba(255,255,255,0.02); border:none; color:var(--f1-muted); font-family:var(--font-display); font-size:0.58rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:transparent; }
.cal-tab.active { background:rgba(225,6,0,0.1); color:var(--f1-red); }
.cal-section { display:none; }
.cal-section.active { display:block; }
</style>
</head>

var CALENDAR = BUILTIN_CALENDAR;
var STANDINGS = null;

function setStatus(state, text) {
  var dot = document.getElementById('refreshDot');
  dot.className = 'dot';
  if (state === 'loading') dot.classList.add('loading');
  else if (state === 'stale') dot.classList.add('stale');
  document.getElementById('refreshLabel').textContent = text;
}

var teamMap = {};
TEAMS.forEach(function(t) { teamMap[t.name.toLowerCase().replace(/[^a-z]/g,'')] = t; });
function getTeamCls(n) { if(!n) return ''; var k = n.toLowerCase().replace(/[^a-z]/g,''); var t = teamMap[k]; return t ? t.cls : ''; }
function posCls(i) { return i === 0 ? 'p1' : i === 1 ? 'p2' : i === 2 ? 'p3' : ''; }
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shortName(s) { var p = String(s).split(' '); return p[p.length - 1]; }
function surname(n) { var p = n.split(' '); return p[p.length - 1]; }

function renderStandings() {
  var data = STANDINGS || getBuiltinData().standings;
  var drivers = data.drivers || [];
  var constructors = data.constructors || [];
  var leader = drivers[0] || {};
  var wins = leader.wins || 0;
  var completedRaces = 0, lastCompleted = null;
  for (var i = 0; i < CALENDAR.length; i++) { if (CALENDAR[i].done) { completedRaces++; lastCompleted = CALENDAR[i]; } }
  var totalRaces = CALENDAR.length;
  var updateText = lastCompleted ? (lastCompleted.name + ' · ' + new Date().toLocaleDateString('zh-CN')) : new Date().toLocaleDateString('zh-CN');

  var html = '';
  html += '<div class="stats-row">';
  html += '<div class="stat-card"><div class="label">2026 领跑者</div><div class="value">' + (leader.driver ? shortName(leader.driver) : '—') + '</div><div class="sub-value">' + esc(leader.team || '') + '</div></div>';
  html += '<div class="stat-card"><div class="label">积分</div><div class="value">' + (leader.points || '—') + '</div></div>';
  html += '<div class="stat-card"><div class="label">分站冠军</div><div class="value">' + wins + '</div></div>';
  html += '<div class="stat-card"><div class="label">剩余分站</div><div class="value">' + (totalRaces - completedRaces) + '</div></div>';
  html += '</div>';

  html += '<h2>车手积分榜</h2><div class="standings-list">';
  for (var i = 0; i < drivers.length; i++) {
    var d = drivers[i], pc = posCls(i);
    html += '<div class="s-row' + (i < 3 ? ' s-podium' : '') + '" style="animation-delay:' + (i * 0.012) + 's">';
    html += '<div class="s-pos-w ' + pc + '">' + (i + 1) + '</div>';
    html += '<div class="s-info"><div class="s-name">' + esc(d.driver) + '</div><div class="s-sub">' + esc(d.team) + '</div></div>';
    html += '<div class="s-meta">🏆 ' + (d.wins || 0) + '</div>';
    html += '<div class="s-pts">' + esc(d.points) + '</div></div>';
  }
  html += '</div>';

  html += '<h2>车队积分榜</h2><div class="standings-list">';
  for (var j = 0; j < constructors.length; j++) {
    var c = constructors[j], pc = posCls(j), tCls = c._cls || getTeamCls(c.team);
    html += '<div class="s-row' + (j < 3 ? ' s-podium' : '') + '" style="animation-delay:' + (j * 0.012) + 's">';
    html += '<div class="s-pos-w ' + pc + '">' + (j + 1) + '</div>';
    html += '<div class="s-info"><div class="s-name">' + (tCls ? '<span class="team-tag ' + tCls + '">' + esc(c.team) + '</span>' : esc(c.team)) + '</div><div class="s-sub">' + esc(c.drivers || '') + '</div></div>';
    html += '<div class="s-pts" style="min-width:42px;">' + esc(c.points) + '</div></div>';
  }
  html += '</div>';
  html += '<p style="font-size:0.58rem;color:var(--f1-muted);text-align:center;">更新至 ' + updateText + ' · ' + new Date().toLocaleString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}) + '</p>';
  document.getElementById('standingsContent').innerHTML = html;
}

function renderCalendar() {
  var upcoming = [], completed = [];
  for (var i = 0; i < CALENDAR.length; i++) {
    if (CALENDAR[i].done) completed.push(CALENDAR[i]); else upcoming.push(CALENDAR[i]);
  }
  var html = '<h2>2026 赛历 · 24 站</h2>';

  // Sub-tabs
  html += '<div class="cal-tabs">';
  html += '<button class="cal-tab active" onclick="switchCalTab(\'upcoming\')">即将举行 · ' + upcoming.length + '</button>';
  html += '<button class="cal-tab" onclick="switchCalTab(\'past\')">已结束 · ' + completed.length + '</button>';
  html += '</div>';

  // Upcoming section
  html += '<div class="cal-section active" id="cal-upcoming"><div class="calendar-grid">';
  for (var u = 0; u < upcoming.length; u++) {
    html += raceCardHTML(upcoming[u], u === 0);
  }
  html += '</div></div>';

  // Past section
  html += '<div class="cal-section" id="cal-past"><div class="calendar-grid">';
  for (var c = 0; c < completed.length; c++) {
    html += raceCardHTML(completed[c], false);
  }
  html += '</div></div>';

  document.getElementById('calendarContent').innerHTML = html;
  bindExpand();
}

function raceCardHTML(r, isNext) {
  var h = '';
  h += '<div class="r-card' + (isNext ? ' next-up' : '') + (r.done ? ' completed' : '') + '" data-round="' + r.r + '" style="animation-delay:' + (r.r * 0.02) + 's">';
  h += '<div class="r-top"><div class="r-flag">' + r.flag + '</div><div class="r-info"><div class="r-name">' + r.name + '</div><div class="r-track">' + r.en + ' · ' + r.track + '</div></div></div>';
  h += '<div class="r-badges">';
  h += (r.done ? '<span class="r-badge done">✓ 已完成</span>' : '<span class="r-badge rnd">R' + r.r + '</span>');
  if (r.sprint) h += '<span class="r-badge sprint">冲刺赛</span>';
  h += '</div>';
  h += '<div class="r-sched">';
  h += '<div class="sl race"><span class="sl-l">🏁 正赛</span><span class="sl-t">' + r.date + ' ' + r.time + '</span></div>';
  h += '<div class="sl quali"><span class="sl-l">⏱ 排位</span><span>' + r.quali + '</span></div>';
  if (r.sprint) {
    h += '<div class="sl sprint"><span class="sl-l">⚡ 冲排</span><span>' + r.sprintQuali + '</span></div>';
    h += '<div class="sl sprint"><span class="sl-l">🏃 冲刺</span><span>' + r.sprintRace + '</span></div>';
  }
  h += '</div>';

  // Detail expand section (populated on click via RACE_DETAILS)
  h += '<div class="r-detail" id="detail-' + r.r + '">';
  h += '<div class="d-block"><div class="d-title">赛道信息</div>';
  h += '<div class="d-info">📍 ' + r.venue + ' · ' + r.track + '</div></div>';
  h += '</div>';

  // Podium for completed races (fallback)
  if (r.podium && r.podium.length >= 3) {
    h += '<div class="r-podium">';
    h += '<div class="pp"><span class="r-pm gold">1</span><span class="pp-name">' + esc(r.podium[0]) + '</span></div>';
    h += '<div class="pp"><span class="r-pm silver">2</span><span class="pp-name">' + esc(r.podium[1]) + '</span></div>';
    h += '<div class="pp"><span class="r-pm bronze">3</span><span class="pp-name">' + esc(r.podium[2]) + '</span></div>';
    h += '</div>';
  }

  h += '<div class="r-toggle" onclick="event.stopPropagation();toggleDetail(this.parentElement)">展开详情 <span class="t-arrow">▾</span></div>';
  h += '</div>';
  return h;
}

function toggleDetail(card) {
  var rnd = parseInt(card.getAttribute('data-round'), 10);
  if (!card.classList.contains('expanded')) {
    // Expanding — load detail if not yet populated
    var detailEl = card.querySelector('.r-detail');
    if (detailEl && !detailEl.getAttribute('data-loaded') && RACE_DETAILS[rnd]) {
      fillDetail(detailEl, rnd);
    }
    card.classList.add('expanded');
  } else {
    card.classList.remove('expanded');
  }
}

function fillDetail(el, rnd) {
  var dd = RACE_DETAILS[rnd];
  if (!dd) return;
  var html = '';

  // Race results (full top 10)
  if (dd.race && dd.race.length) {
    html += '<div class="d-block"><div class="d-title">🏁 正赛结果</div>';
    for (var i = 0; i < dd.race.length; i++) {
      var rc = dd.race[i];
      html += '<div class="d-row"><span class="d-pos">P' + rc.pos + '</span><span class="d-name">' + rc.driver + '</span><span class="d-time">' + (rc.time || '') + '</span></div>';
    }
    html += '</div>';
  }

  // Qualifying results (top 10)
  if (dd.quali && dd.quali.length) {
    html += '<div class="d-block"><div class="d-title">⏱ 排位赛结果</div>';
    for (var i = 0; i < Math.min(dd.quali.length, 10); i++) {
      var q = dd.quali[i];
      html += '<div class="d-row"><span class="d-pos">' + (i + 1) + '</span><span class="d-name">' + q.driver + '</span><span class="d-time">' + (q.time || '') + '</span></div>';
    }
    html += '</div>';
  }

  // Sprint results
  if (dd.sprint && dd.sprint.length) {
    html += '<div class="d-block"><div class="d-title">🏃 冲刺赛结果</div>';
    for (var i = 0; i < Math.min(dd.sprint.length, 8); i++) {
      var s = dd.sprint[i];
      html += '<div class="d-row"><span class="d-pos">' + (i + 1) + '</span><span class="d-name">' + s.driver + '</span><span class="d-time">' + (s.time || '') + '</span></div>';
    }
    html += '</div>';
  }

  // Fastest lap
  if (dd.fastestLap) {
    html += '<div class="d-block"><div class="d-title">⚡ 最快圈速</div>';
    html += '<div class="d-row"><span class="d-name">' + dd.fastestLap.driver + '</span><span class="d-time">' + dd.fastestLap.time + '</span></div></div>';
  }

  el.innerHTML = html;
  el.setAttribute('data-loaded', '1');
}

function loadAll() {
  setStatus('loading', '正在拉取最新数据…');

  var calendarPromise = fetch('data.json')
    .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
    .then(function(json) { if (json.calendar && json.calendar.length) CALENDAR = json.calendar; })
    .catch(function(err) { console.warn('data.json 不可用：', err.message); });

  var standingsPromise = Promise.all([
    fetch('https://api.jolpi.ca/ergast/f1/2026/driverStandings.json').then(function(r) { return r.json(); }),
    fetch('https://api.jolpi.ca/ergast/f1/2026/constructorStandings.json').then(function(r) { return r.json(); })
  ]).then(function(results) {
    var dList = results[0].MRData.StandingsTable.StandingsLists[0].DriverStandings || [];
    var drivers = dList.map(function(it) { return { driver: it.Driver.givenName + ' ' + it.Driver.familyName, team: it.Constructors[0].name, wins: parseInt(it.wins, 10) || 0, points: parseInt(it.points, 10) || 0 }; });
    var cList = results[1].MRData.StandingsTable.StandingsLists[0].ConstructorStandings || [];
    var constructors = cList.map(function(it) { return { team: it.Constructor.name, points: parseInt(it.points, 10) || 0, drivers: '' }; });
    var tbn = {};
    TEAMS.forEach(function(t) { tbn[t.name.replace(/[^a-zA-Z]/g, '').toLowerCase()] = t; });
    constructors.forEach(function(c) {
      var ck = c.team.replace(/[^a-zA-Z]/g, '').toLowerCase();
      if (tbn[ck]) { c.drivers = surname(tbn[ck].d1) + ' / ' + surname(tbn[ck].d2); c._cls = tbn[ck].cls; return; }
      for (var k in tbn) { if (k.indexOf(ck) !== -1 || ck.indexOf(k) !== -1) { c.drivers = surname(tbn[k].d1) + ' / ' + surname(tbn[k].d2); c._cls = tbn[k].cls; return; } }
      if (ck === 'rbf1team' && tbn['racingbulls']) { c.drivers = surname(tbn['racingbulls'].d1) + ' / ' + surname(tbn['racingbulls'].d2); c._cls = tbn['racingbulls'].cls; }
    });
    STANDINGS = { drivers: drivers, constructors: constructors };
    DATA_TS = results[0].MRData.StandingsTable.StandingsLists[0].round || '';
    return fetchRaceDetails(parseInt(DATA_TS, 10) || 0);
  }).catch(function(err) { console.warn('Jolpica API 不可用：', err.message); });

  function fetchRaceDetails(maxRound) {
    if (maxRound <= 0) return Promise.resolve();
    var fetches = [];
    for (var r = 1; r <= maxRound; r++) {
      (function(rr) {
        fetches.push(
          Promise.all([
            fetch('https://api.jolpi.ca/ergast/f1/2026/' + rr + '/results.json').then(function(r) { if (!r.ok) throw new Error(); return r.json(); }).catch(function() { return null; }),
            fetch('https://api.jolpi.ca/ergast/f1/2026/' + rr + '/qualifying.json').then(function(r) { if (!r.ok) throw new Error(); return r.json(); }).catch(function() { return null; }),
            fetch('https://api.jolpi.ca/ergast/f1/2026/' + rr + '/sprint.json').then(function(r) { if (!r.ok) throw new Error(); return r.json(); }).catch(function() { return null; })
          ]).then(function(results) {
            var raceJson = results[0], qualiJson = results[1], sprintJson = results[2];
            // Podium from race results
            if (raceJson) {
              var races = raceJson.MRData.RaceTable.Races || [];
              if (races.length) {
                var resList = races[0].Results || [];
                var podium = [];
                for (var i = 0; i < Math.min(resList.length, 3); i++) {
                  podium.push(resList[i].Driver.givenName + ' ' + resList[i].Driver.familyName);
                }
                var idx = rr - 1;
                if (CALENDAR[idx]) CALENDAR[idx].podium = podium;
                // Store race results detail
                var raceEntries = resList.slice(0, 10).map(function(entry) {
                  return { driver: entry.Driver.givenName + ' ' + entry.Driver.familyName, pos: entry.position, time: entry.Time ? entry.Time.time : (entry.status || '') };
                });
                // Fastest lap
                var fastest = null;
                for (var j = 0; j < resList.length; j++) {
                  var fl = resList[j].FastestLap;
                  if (fl && fl.rank === '1') {
                    fastest = { driver: resList[j].Driver.givenName + ' ' + resList[j].Driver.familyName, time: fl.Time.time };
                    break;
                  }
                }
                RACE_DETAILS[rr] = RACE_DETAILS[rr] || {};
                RACE_DETAILS[rr].race = raceEntries;
                RACE_DETAILS[rr].fastestLap = fastest;
              }
            }
            // Qualifying results
            if (qualiJson) {
              var qRaces = qualiJson.MRData.RaceTable.Races || [];
              if (qRaces.length) {
                var qResults = qRaces[0].QualifyingResults || [];
                RACE_DETAILS[rr] = RACE_DETAILS[rr] || {};
                RACE_DETAILS[rr].quali = qResults.slice(0, 10).map(function(q) {
                  return { driver: q.Driver.givenName + ' ' + q.Driver.familyName, time: q.Q3 || q.Q2 || q.Q1 || '' };
                });
              }
            }
            // Sprint results
            if (sprintJson) {
              var sRaces = sprintJson.MRData.RaceTable.Races || [];
              if (sRaces.length) {
                var sResults = sRaces[0].SprintResults || [];
                RACE_DETAILS[rr] = RACE_DETAILS[rr] || {};
                RACE_DETAILS[rr].sprint = sResults.slice(0, 8).map(function(s) {
                  return { driver: s.Driver.givenName + ' ' + s.Driver.familyName, time: s.Time ? s.Time.time : (s.status || '') };
                });
              }
            }
          })
        );
      })(r);
    }
    return Promise.all(fetches);
  }

  Promise.all([calendarPromise, standingsPromise])
    .then(function() { setStatus('', '数据已更新'); renderAll(); })
    .catch(function() { setStatus('stale', '部分数据来自本地'); renderAll(); });
}

function renderAll() { renderCalendar(); renderTeams(); renderStandings(); }

function switchCalTab(tab) {
  document.querySelectorAll('.cal-tab').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.cal-section').forEach(function(s) { s.classList.remove('active'); });
  if (tab === 'upcoming') { document.querySelector('.cal-tabs button:first-child').classList.add('active'); }
  else { document.querySelector('.cal-tabs button:last-child').classList.add('active'); }
  document.getElementById('cal-' + tab).classList.add('active');
}

loadAll();

document.querySelectorAll('nav button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
    this.classList.add('active');
    document.getElementById(this.dataset.tab).classList.add('active');
  });
});

</script>
